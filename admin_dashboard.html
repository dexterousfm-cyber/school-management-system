<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#f5f5f5; }
.header { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:#800000; color:white; }
.header .logo img { width:120px; height:auto; object-fit:contain; }
.header .profile { display:flex; align-items:center; gap:10px; }
.header .profile img { width:40px; height:40px; border-radius:50%; border:1px solid white; object-fit:cover; }
.header .profile span { font-weight:bold; }
.container { padding:30px; }
button { padding:8px 16px; margin:5px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
button.primary { background:#800000; color:white; }
button.primary:hover { background:#a00000; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.15); }
th, td { padding:12px; text-align:center; border:1px solid #ddd; }
th { background:#800000; color:white; }
img.avatar-small { width:50px; height:50px; border-radius:50%; object-fit:cover; }
table tr:hover { background:#fff2f2; }

/* Modal */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
.modal-content { background:white; padding:20px; border-radius:10px; width:400px; }
.modal-content input { width:100%; padding:5px; margin:5px 0; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo"><img src="logo-new.png" alt="Logo"></div>
    <div class="profile">
        <img src="admin.png" alt="Admin">
        <span id="adminName">Welcome Admin</span>
        <button id="logoutBtn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">

    <!-- Action Buttons -->
    <div class="actions">
        <button class="primary" onclick="openTeacherForm()">Register Teacher</button>
        <button class="primary" onclick="openStudentForm()">Register Student</button>
        <button class="primary" onclick="showTable('teachers')">Show Teachers</button>
        <button class="primary" onclick="showTable('students')">Show Students</button>
    </div>

    <!-- Tables -->
    <table id="teachersTable"></table>
    <table id="studentsTable" style="display:none;"></table>

</div>

<!-- Teacher Modal -->
<div class="modal" id="teacherModal">
  <div class="modal-content">
    <h3>Register Teacher</h3>
    <input type="text" id="teacherNameInput" placeholder="Name">
    <input type="email" id="teacherEmailInput" placeholder="Email">
    <input type="text" id="teacherIDInput" placeholder="Teacher ID">
    <input type="text" id="teacherDeptInput" placeholder="Department">
    <input type="password" id="teacherPasswordInput" placeholder="Password">
    <input type="file" id="teacherPicInput">
    <button onclick="registerTeacher()">Register</button>
    <button onclick="closeTeacherForm()">Cancel</button>
  </div>
</div>

<!-- Student Modal -->
<div class="modal" id="studentModal">
  <div class="modal-content">
    <h3>Register Student</h3>
    <input type="text" id="studentNameInput" placeholder="Name">
    <input type="email" id="studentEmailInput" placeholder="Email">
    <input type="text" id="studentIDInput" placeholder="Student ID">
    <input type="text" id="studentClassInput" placeholder="Class">
    <input type="text" id="studentYearInput" placeholder="Year">
    <input type="file" id="studentPicInput">
    <button onclick="registerStudent()">Register</button>
    <button onclick="closeStudentForm()">Cancel</button>
  </div>
</div>

<script>
// Data arrays
let teachers = [];
let students = [];

// Render Functions
function renderTeachersTable(){
    const table = document.getElementById('teachersTable');
    let html = `<tr>
        <th>Picture</th>
        <th>Name</th>
        <th>Email</th>
        <th>Teacher ID</th>
        <th>Department</th>
        <th>Password</th>
        <th>Edit</th>
    </tr>`;
    teachers.forEach((t,i)=>{
        html += `<tr>
            <td><img src="${t.profilePicture}" class="avatar-small"></td>
            <td>${t.name}</td>
            <td>${t.email}</td>
            <td>${t.teacherID}</td>
            <td>${t.department}</td>
            <td>${t.password}</td>
            <td><button onclick="editTeacher(${i})">Edit</button></td>
        </tr>`;
    });
    table.innerHTML = html;
}

function renderStudentsTable(){
    const table = document.getElementById('studentsTable');
    let html = `<tr><th>Picture</th><th>Name</th><th>Email</th><th>Student ID</th><th>Class</th><th>Year</th><th>Edit</th></tr>`;
    students.forEach((s,i)=>{
        html += `<tr>
            <td><img src="${s.profilePicture}" class="avatar-small"></td>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.studentID}</td>
            <td>${s.studentClass}</td>
            <td>${s.studentYear}</td>
            <td><button onclick="editStudent(${i})">Edit</button></td>
        </tr>`;
    });
    table.innerHTML = html;
}

// Show/Hide Tables
function showTable(table){
    document.getElementById('teachersTable').style.display = (table==='teachers')?'':'none';
    document.getElementById('studentsTable').style.display = (table==='students')?'':'none';
}

// Edit placeholders
function editTeacher(i){ alert('Edit Teacher: '+teachers[i].name); }
function editStudent(i){ alert('Edit Student: '+students[i].name); }

// ---------------- LOGOUT ----------------
function logout() {
    window.location.href = 'index.html'; // replace 'index.html' with your actual login page
}

// Teacher Form
function openTeacherForm(){ document.getElementById('teacherModal').style.display='flex'; }
function closeTeacherForm(){ document.getElementById('teacherModal').style.display='none'; }
function registerTeacher(){
    let name = document.getElementById('teacherNameInput').value;
    let email = document.getElementById('teacherEmailInput').value;
    let id = document.getElementById('teacherIDInput').value;
    let dept = document.getElementById('teacherDeptInput').value;
    let password = document.getElementById('teacherPasswordInput').value;
    let file = document.getElementById('teacherPicInput').files[0];

    if(!name || !email || !password){ alert('Name, Email, and Password are required'); return; }

    let reader = new FileReader();
    reader.onload = function(e){
        let pic = e.target.result;
        teachers.push({profilePicture:pic,name,email,teacherID:id,department:dept,password});
        renderTeachersTable();
        closeTeacherForm();
    }
    if(file) reader.readAsDataURL(file);
    else {
        teachers.push({profilePicture:'teacher.png',name,email,teacherID:id,department:dept,password});
        renderTeachersTable();
        closeTeacherForm();
    }
}

// Student Form
function openStudentForm(){ document.getElementById('studentModal').style.display='flex'; }
function closeStudentForm(){ document.getElementById('studentModal').style.display='none'; }
function registerStudent(){
    let name = document.getElementById('studentNameInput').value;
    let email = document.getElementById('studentEmailInput').value;
    let id = document.getElementById('studentIDInput').value;
    let studentClass = document.getElementById('studentClassInput').value;
    let year = document.getElementById('studentYearInput').value;
    let file = document.getElementById('studentPicInput').files[0];

    if(!name || !email){ alert('Name and Email are required'); return; }

    let reader = new FileReader();
    reader.onload = function(e){
        let pic = e.target.result;
        students.push({profilePicture:pic,name,email,studentID:id,studentClass,studentYear:year});
        renderStudentsTable();
        closeStudentForm();
    }
    if(file) reader.readAsDataURL(file);
    else {
        students.push({profilePicture:'student.png',name,email,studentID:id,studentClass,studentYear:year});
        renderStudentsTable();
        closeStudentForm();
    }
}

// Initial load
renderTeachersTable();
renderStudentsTable();
showTable('teachers');
</script>

</body>
</html>
