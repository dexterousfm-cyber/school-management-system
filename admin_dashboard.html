<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - ADUE Portal</title>
<link rel="stylesheet" href="styles.css">
<style>
.header { background:#722F37; padding:20px; color:white; display:flex; justify-content:space-between; align-items:center; }
.logout-btn { background:white; color:#722F37; padding:8px 16px; border:none; border-radius:6px; cursor:pointer; }
.dashboard-buttons button { padding:10px 20px; margin:10px; background:#722F37; color:white; border:none; border-radius:6px; cursor:pointer; }
table { width:100%; border-collapse:collapse; margin-top:20px; }
th,td { border:1px solid #ccc; padding:10px; text-align:center; }
th { background:#eee; }
img { border-radius:50%; }
</style>
</head>
<body>

<div class="header">
    <h1>Admin Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="dashboard-buttons">
    <button onclick="window.location.href='register_teacher.html'">Register Teacher</button>
    <button onclick="window.location.href='register_student.html'">Register Student</button>
</div>

<h2>Teachers</h2>
<table id="teachersTable">
<thead>
<tr><th>Picture</th><th>Name</th><th>Email</th><th>Teacher ID</th><th>Department</th></tr>
</thead>
<tbody></tbody>
</table>

<h2>Students</h2>
<table id="studentsTable">
<thead>
<tr><th>Picture</th><th>Name</th><th>Email</th><th>ID</th><th>Class</th><th>Year</th><th>Result</th></tr>
</thead>
<tbody></tbody>
</table>

<script>
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];

function renderAdminTables(){
    let tBody = document.querySelector("#teachersTable tbody");
    tBody.innerHTML = "";
    teachers.forEach(t=>{
        tBody.innerHTML += `<tr>
            <td><img src="${t.profilePicture||'default-teacher.png'}" width="70" height="70"></td>
            <td>${t.name}</td><td>${t.email}</td><td>${t.teacherID}</td><td>${t.department}</td>
        </tr>`;
    });

    let sBody = document.querySelector("#studentsTable tbody");
    sBody.innerHTML = "";
    students.forEach(s=>{
        sBody.innerHTML += `<tr>
            <td><img src="${s.profilePicture||'default-student.png'}" width="70" height="70"></td>
            <td>${s.name}</td><td>${s.email}</td><td>${s.studentID}</td><td>${s.studentClass}</td><td>${s.studentYear}</td><td>${s.result||''}</td>
        </tr>`;
    });
}
renderAdminTables();

function logout(){
    window.location.href='index.html';
}
</script>

</body>
</html>
