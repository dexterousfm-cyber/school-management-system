<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <div class="logo"><img src="logo-new.png" alt="Logo"></div>
    <div class="profile">
        <span id="adminName">Welcome Admin</span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <button class="primary" onclick="registerTeacher()">Register Teacher</button>
    <button class="primary" onclick="registerStudent()">Register Student</button>
    <button class="primary" onclick="renderTeachersTable()">Show Teachers</button>
    <button class="primary" onclick="renderStudentsTable()">Show Students</button>

    <table id="table"></table>
</div>

<!-- Modal for edit/delete -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Edit Record</h3>
    <input type="text" id="modalName" placeholder="Name">
    <input type="text" id="modalEmail" placeholder="Email">
    <input type="text" id="modalID" placeholder="ID">
    <input type="text" id="modalDeptOrClass" placeholder="Department/Class">
    <input type="text" id="modalYear" placeholder="Year">
    <input type="password" id="modalPassword" placeholder="Password">
    <button onclick="saveRecord()">Save</button>
    <button class="cancel" onclick="closeModal()">Cancel</button>
    <button class="delete" onclick="deleteRecord()">Delete</button>
  </div>
</div>

<script>
// ---------- LOAD DATA ----------
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];
let currentAdminIndex = parseInt(localStorage.getItem('currentAdminIndex')) || 0;
let editIndex = null;
document.getElementById('adminName').innerText = `Welcome Admin`;

// ---------- TEACHER FUNCTIONS ----------
function renderTeachersTable() {
    teachers = JSON.parse(localStorage.getItem('teachers')) || [];
    let html = `<tr><th>Name</th><th>Email</th><th>Teacher ID</th><th>Department</th><th>Edit</th></tr>`;
    teachers.forEach((t,i)=>{
        html += `<tr>
            <td>${t.name}</td>
            <td>${t.email}</td>
            <td>${t.teacherID}</td>
            <td>${t.department || ''}</td>
            <td><button onclick="openModal(${i},'teacher')">Edit/Delete</button></td>
        </tr>`;
    });
    document.getElementById('table').innerHTML = html;
}

// ---------- STUDENT FUNCTIONS ----------
function renderStudentsTable() {
    students = JSON.parse(localStorage.getItem('students')) || [];
    let html = `<tr><th>Name</th><th>Email</th><th>Student ID</th><th>Class</th><th>Year</th><th>Edit</th></tr>`;
    students.forEach((s,i)=>{
        html += `<tr>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.studentID}</td>
            <td>${s.studentClass || ''}</td>
            <td>${s.studentYear || ''}</td>
            <td><button onclick="openModal(${i},'student')">Edit/Delete</button></td>
        </tr>`;
    });
    document.getElementById('table').innerHTML = html;
}

// ---------- REGISTER ----------
function registerTeacher() {
    let name = prompt("Teacher Name:");
    let email = prompt("Email:");
    let teacherID = prompt("Teacher ID:");
    let department = prompt("Department:");
    let password = prompt("Password:");

    teachers = JSON.parse(localStorage.getItem('teachers')) || [];
    teachers.push({name,email,teacherID,department,password});
    localStorage.setItem('teachers', JSON.stringify(teachers));
    renderTeachersTable();
}

function registerStudent() {
    let name = prompt("Student Name:");
    let email = prompt("Email:");
    let studentID = prompt("Student ID:");
    let studentClass = prompt("Class:");
    let studentYear = prompt("Year:");
    let password = prompt("Password:");

    students = JSON.parse(localStorage.getItem('students')) || [];
    students.push({name,email,studentID,studentClass,studentYear,password});
    localStorage.setItem('students', JSON.stringify(students));
    renderStudentsTable();
}

// ---------- MODAL ----------
let modalType = '';
function openModal(i,type){
    editIndex = i;
    modalType = type;
    const obj = type==='teacher'? teachers[i] : students[i];
    document.getElementById('modalName').value = obj.name;
    document.getElementById('modalEmail').value = obj.email;
    document.getElementById('modalID').value = type==='teacher'? obj.teacherID : obj.studentID;
    document.getElementById('modalDeptOrClass').value = type==='teacher'? obj.department || '' : obj.studentClass || '';
    document.getElementById('modalYear').value = type==='teacher'? '' : obj.studentYear || '';
    document.getElementById('modalPassword').value = obj.password;
    document.getElementById('modal').style.display='flex';
}

function closeModal(){ document.getElementById('modal').style.display='none'; }

function saveRecord(){
    let obj = modalType==='teacher'? teachers[editIndex] : students[editIndex];
    obj.name = document.getElementById('modalName').value;
    obj.email = document.getElementById('modalEmail').value;
    if(modalType==='teacher') obj.teacherID = document.getElementById('modalID').value;
    else obj.studentID = document.getElementById('modalID').value;
    if(modalType==='teacher') obj.department = document.getElementById('modalDeptOrClass').value;
    else obj.studentClass = document.getElementById('modalDeptOrClass').value;
    if(modalType==='student') obj.studentYear = document.getElementById('modalYear').value;
    obj.password = document.getElementById('modalPassword').value;

    if(modalType==='teacher') localStorage.setItem('teachers', JSON.stringify(teachers));
    else localStorage.setItem('students', JSON.stringify(students));
    closeModal();
    modalType==='teacher'? renderTeachersTable() : renderStudentsTable();
}

function deleteRecord(){
    if(confirm("Are you sure?")){
        if(modalType==='teacher') teachers.splice(editIndex,1);
        else students.splice(editIndex,1);
        localStorage.setItem(modalType==='teacher'?'teachers':'students', modalType==='teacher'? JSON.stringify(teachers): JSON.stringify(students));
        closeModal();
        modalType==='teacher'? renderTeachersTable() : renderStudentsTable();
    }
}

// ---------- LOGOUT ----------
function logout(){ window.location.href='index.html'; }

// ---------- INITIAL LOAD ----------
renderTeachersTable();
</script>
</body>
</html>
