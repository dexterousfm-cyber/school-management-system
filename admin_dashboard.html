<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Admin Dashboard</title>
<link rel="stylesheet" href="styles.css">
<style>
h1,h2 { color:white; background:#722F37; padding:15px; border-radius:8px; }
table { width:100%; border-collapse:collapse; margin:15px 0; }
th,td { border:1px solid #ccc; padding:10px; text-align:center; }
th { background:#eee; }
img { border-radius:50%; }
button { padding:5px 10px; border:none; background:#722F37; color:white; cursor:pointer; border-radius:5px; }
button:hover { opacity:0.9; }
.logout-btn { background:#ccc; color:#722F37; float:right; margin:10px; }
</style>
</head>
<body>

<h1>ADUE Admin Dashboard</h1>
<button class="logout-btn" onclick="logout()">Logout</button>

<h2>Teachers</h2>
<table id="teachersTable">
<thead>
<tr><th>Picture</th><th>Name</th><th>Email</th><th>Teacher ID</th><th>Department</th><th>Actions</th></tr>
</thead>
<tbody></tbody>
</table>

<h2>Students</h2>
<table id="studentsTable">
<thead>
<tr><th>Picture</th><th>Name</th><th>Email</th><th>Student ID</th><th>Class</th><th>Year</th><th>Actions</th></tr>
</thead>
<tbody></tbody>
</table>

<script>
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];

function populateTables(){
    const tBody = document.querySelector('#teachersTable tbody');
    const sBody = document.querySelector('#studentsTable tbody');
    tBody.innerHTML=''; sBody.innerHTML='';

    teachers.forEach((t,i)=>{
        tBody.innerHTML += `<tr>
            <td><img src="${t.profilePicture||'default-teacher.png'}" width="70" height="70"></td>
            <td>${t.name}</td><td>${t.email}</td><td>${t.teacherID}</td><td>${t.department}</td>
            <td><button onclick="editTeacher(${i})">Edit</button> <button onclick="deleteTeacher(${i})">Delete</button></td>
        </tr>`;
    });

    students.forEach((s,i)=>{
        sBody.innerHTML += `<tr>
            <td><img src="${s.profilePicture||'default-student.png'}" width="70" height="70"></td>
            <td>${s.name}</td><td>${s.email}</td><td>${s.studentID}</td><td>${s.studentClass}</td><td>${s.studentYear}</td>
            <td><button onclick="editStudent(${i})">Edit</button> <button onclick="deleteStudent(${i})">Delete</button></td>
        </tr>`;
    });
}

populateTables();

function logout(){ window.location.href="index.html"; }

function editTeacher(index){ alert("Edit functionality can be implemented here."); }
function deleteTeacher(index){ teachers.splice(index,1); localStorage.setItem('teachers',JSON.stringify(teachers)); populateTables(); }
function editStudent(index){ alert("Edit functionality can be implemented here."); }
function deleteStudent(index){ students.splice(index,1); localStorage.setItem('students',JSON.stringify(students)); populateTables(); }
</script>

</body>
</html>
