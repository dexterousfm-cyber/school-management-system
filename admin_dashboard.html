<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | ADUE</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
    <img src="logo-new.png" alt="ADUE Logo" class="logo">
    <h1>Admin Dashboard</h1>
</header>

<main class="dashboard">

    <!-- Summary Cards -->
    <section class="summary-cards">
        <div class="card staff-card">
            <h2>Total Staff</h2>
            <p id="total-staff">0</p>
        </div>
        <div class="card student-card">
            <h2>Total Students</h2>
            <p id="total-students">0</p>
        </div>
    </section>

    <!-- Staff Directory -->
    <section class="staff-list">
        <h2>Staff Directory</h2>
        <ul id="staff-ul">
            <!-- Staff entries -->
        </ul>
    </section>

    <!-- Student Directory -->
    <section class="student-list">
        <h2>Student Directory</h2>
        <ul id="student-ul">
            <!-- Student entries -->
        </ul>
    </section>

    <!-- Action Buttons -->
    <section class="actions">
        <button onclick="location.href='register_teacher.html'">Register Teacher</button>
        <button onclick="location.href='register_student.html'">Register Student</button>
        <button onclick="logout()">Logout</button>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
