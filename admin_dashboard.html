<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<style>
body { font-family: Arial; background:#f5f5f5; }
h2 { text-align:center; }
button { padding:10px; margin:5px; }
table { width:90%; margin:auto; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:10px; text-align:center; }
th { background:#800000; color:white; }
</style>
</head>
<body>

<h2>Admin Dashboard</h2>

<div style="text-align:center;">
<button onclick="showTeachers()">Show Teachers</button>
<button onclick="showStudents()">Show Students</button>
<button onclick="registerTeacher()">Add Teacher</button>
<button onclick="registerStudent()">Add Student</button>
<button onclick="logout()">Logout</button>
</div>

<table id="table"></table>

<script>
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];

// Show Teachers
function showTeachers(){
let html = `<tr><th>Name</th><th>Email</th><th>ID</th></tr>`;
teachers.forEach(t=>{
html += `<tr><td>${t.name}</td><td>${t.email}</td><td>${t.teacherID}</td></tr>`;
});
document.getElementById("table").innerHTML = html;
}

// Show Students
function showStudents(){
let html = `<tr><th>Name</th><th>Email</th><th>ID</th></tr>`;
students.forEach(s=>{
html += `<tr><td>${s.name}</td><td>${s.email}</td><td>${s.studentID}</td></tr>`;
});
document.getElementById("table").innerHTML = html;
}

// Register Teacher
function registerTeacher(){
let name = prompt("Name:");
let email = prompt("Email:");
let id = prompt("Teacher ID:");
let password = prompt("Password:");

teachers.push({name,email,teacherID:id,password});
localStorage.setItem('teachers', JSON.stringify(teachers));

alert("Teacher added");
}

// Register Student
function registerStudent(){
let name = prompt("Name:");
let email = prompt("Email:");
let id = prompt("Student ID:");
let password = prompt("Password:");

students.push({name,email,studentID:id,password});
localStorage.setItem('students', JSON.stringify(students));

alert("Student added");
}

// Logout
function logout(){
window.location.href = "index.html";
}

// Load default
showTeachers();
</script>

</body>
</html>
