<script>
// Load arrays from localStorage
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];

// -------------------- TEACHER --------------------
function openTeacherForm(){ document.getElementById('teacherModal').style.display='flex'; }
function closeTeacherForm(){ document.getElementById('teacherModal').style.display='none'; }

function registerTeacher(){
    const name = document.getElementById('teacherNameInput').value.trim();
    const email = document.getElementById('teacherEmailInput').value.trim();
    const teacherID = document.getElementById('teacherIDInput').value.trim();
    const dept = document.getElementById('teacherDeptInput').value.trim();
    const password = document.getElementById('teacherPasswordInput').value.trim();
    const file = document.getElementById('teacherPicInput').files[0];

    if(!name || !email || !password){
        alert("Name, Email, and Password are required");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e){
        const pic = e.target.result;
        const teacher = { name, email, teacherID, department: dept, password, profilePicture: pic || 'teacher.png' };
        teachers.push(teacher);
        localStorage.setItem('teachers', JSON.stringify(teachers)); // save to localStorage
        renderTeachersTable();
        closeTeacherForm();
    }
    if(file) reader.readAsDataURL(file);
    else reader.onload({target:{result:'teacher.png'}}); // use default picture if none
}

// -------------------- STUDENT --------------------
function openStudentForm(){ document.getElementById('studentModal').style.display='flex'; }
function closeStudentForm(){ document.getElementById('studentModal').style.display='none'; }

function registerStudent(){
    const name = document.getElementById('studentNameInput').value.trim();
    const email = document.getElementById('studentEmailInput').value.trim();
    const studentID = document.getElementById('studentIDInput').value.trim();
    const studentClass = document.getElementById('studentClassInput').value.trim();
    const studentYear = document.getElementById('studentYearInput').value.trim();
    const password = document.getElementById('studentPasswordInput').value.trim(); // make sure you added this input!
    const file = document.getElementById('studentPicInput').files[0];

    if(!name || !email || !password){
        alert("Name, Email, and Password are required");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e){
        const pic = e.target.result;
        const student = { name, email, studentID, studentClass, studentYear, password, profilePicture: pic || 'student.png' };
        students.push(student);
        localStorage.setItem('students', JSON.stringify(students)); // save to localStorage
        renderStudentsTable();
        closeStudentForm();
    }
    if(file) reader.readAsDataURL(file);
    else reader.onload({target:{result:'student.png'}});
}

// -------------------- TABLE RENDERING --------------------
function renderTeachersTable(){
    const table = document.getElementById('teachersTable');
    let html = `<tr>
        <th>Picture</th><th>Name</th><th>Email</th><th>Teacher ID</th><th>Department</th><th>Edit</th>
    </tr>`;
    teachers.forEach((t,i)=>{
        html += `<tr>
            <td><img src="${t.profilePicture}" class="avatar-small"></td>
            <td>${t.name}</td>
            <td>${t.email}</td>
            <td>${t.teacherID}</td>
            <td>${t.department}</td>
            <td><button onclick="editTeacher(${i})">Edit</button></td>
        </tr>`;
    });
    table.innerHTML = html;
}

function renderStudentsTable(){
    const table = document.getElementById('studentsTable');
    let html = `<tr>
        <th>Picture</th><th>Name</th><th>Email</th><th>Student ID</th><th>Class</th><th>Year</th><th>Edit</th>
    </tr>`;
    students.forEach((s,i)=>{
        html += `<tr>
            <td><img src="${s.profilePicture}" class="avatar-small"></td>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.studentID}</td>
            <td>${s.studentClass}</td>
            <td>${s.studentYear}</td>
            <td><button onclick="editStudent(${i})">Edit</button></td>
        </tr>`;
    });
    table.innerHTML = html;
}

// -------------------- EDIT PLACEHOLDER --------------------
function editTeacher(i){ 
    // Admin can view password here if needed
    const t = teachers[i];
    const newPassword = prompt(`Teacher Password for ${t.name}:`, t.password);
    if(newPassword !== null) { 
        t.password = newPassword; 
        localStorage.setItem('teachers', JSON.stringify(teachers));
    }
    renderTeachersTable();
}

function editStudent(i){ 
    const s = students[i];
    const newPassword = prompt(`Student Password for ${s.name}:`, s.password);
    if(newPassword !== null) { 
        s.password = newPassword; 
        localStorage.setItem('students', JSON.stringify(students));
    }
    renderStudentsTable();
}

// -------------------- TOGGLE TABLE --------------------
function showTable(table){
    document.getElementById('teachersTable').style.display = (table==='teachers')?'':'none';
    document.getElementById('studentsTable').style.display = (table==='students')?'':'none';
}

// Initial render
renderTeachersTable();
renderStudentsTable();
showTable('teachers');
</script>
