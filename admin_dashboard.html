<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Admin Dashboard</h1>
    <button id="logoutBtn">Logout</button>

    <!-- ADD ADMIN -->
    <h2>Add Admin</h2>
    <form id="addAdminForm">
        <input type="text" id="adminName" placeholder="Full Name" required>
        <input type="email" id="adminEmail" placeholder="Email" required>
        <input type="password" id="adminPassword" placeholder="Password" required>
        <button type="submit">Add Admin</button>
    </form>

    <!-- ADD TEACHER -->
    <h2>Add Teacher</h2>
    <form id="addTeacherForm">
        <input type="text" id="teacherName" placeholder="Full Name" required>
        <input type="email" id="teacherEmail" placeholder="Email" required>
        <input type="password" id="teacherPassword" placeholder="Password" required>
        <input type="text" id="teacherSubjects" placeholder="Subjects (Math, English)" required>
        <button type="submit">Add Teacher</button>
    </form>

    <!-- ADD STUDENT -->
    <h2>Add Student</h2>
    <form id="addStudentForm">
        <input type="text" id="studentName" placeholder="Full Name" required>
        <input type="email" id="studentEmail" placeholder="Email" required>
        <input type="password" id="studentPassword" placeholder="Password" required>

        <select id="studentClass" required>
            <option value="">Select Class</option>
            <option>Year 7</option>
            <option>Year 8</option>
            <option>Year 9</option>
            <option>Year 10</option>
        </select>

        <button type="submit">Add Student</button>
    </form>

</div>

<script src="script.js"></script>
</body>
</html>
