<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Adue International School</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .nav { text-align: center; padding: 10px; background: #333; }
        .nav a { color: white; margin: 0 15px; font-weight: bold; text-decoration: none; }
        .nav a.current { text-decoration: underline; }
        .cards-container { width: 60%; margin: 50px auto; display: flex; justify-content: space-around; flex-wrap: wrap; }
        .card { background: white; padding: 30px; border-radius: 10px; width: 40%; text-align: center; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card p { font-size: 24px; font-weight: bold; }
        footer { text-align: center; padding: 20px; background: #333; color: white; margin-top: 50px; }
        button.logout { background: red; margin-top: 10px; }
    </style>
</head>
<body>

<script>
const loggedUser = localStorage.getItem("loggedInUser");
const loggedRole = localStorage.getItem("loggedInRole");
if(!loggedUser || !loggedRole){ window.location.href = "index.html"; }
</script>

<div class="nav">
    <a href="dashboard.html" class="current">Dashboard</a>
    <a href="students.html">Students</a>
    <a href="teachers.html">Teachers</a>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div id="content" class="cards-container"></div>

<footer>Adue International School by Abiola Ridwan Olamilekan</footer>

<script>
function logout(){
    localStorage.removeItem("loggedInUser");
    localStorage.removeItem("loggedInRole");
    window.location.href = "index.html";
}

function loadDashboard(){
    const content = document.getElementById("content");
    const students = JSON.parse(localStorage.getItem("students")) || [];
    const teachers = JSON.parse(localStorage.getItem("teachers")) || [];

    if(loggedRole === "student"){
        const student = students.find(s => s.username === loggedUser);
        content.innerHTML = `
            <div class="card"><h2>Welcome, ${student.name}</h2><p>Class: ${student.class}</p></div>
            <div class="card"><h2>Results</h2>
            <p>Math: ${student.results.math}</p>
            <p>English: ${student.results.english}</p></div>
        `;
    } else {
        content.innerHTML = `
            <div class="card"><h2>Total Students</h2><p>${students.length}</p><a href="students.html">Go to Students</a></div>
            <div class="card"><h2>Total Teachers</h2><p>${teachers.length}</p><a href="teachers.html">Go to Teachers</a></div>
        `;
    }
}
window.onload = loadDashboard;
</script>

</body>
</html>
