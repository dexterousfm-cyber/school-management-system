<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Student</title>
<link rel="stylesheet" href="styles.css">
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f9f9f9; }
.header { background:#800000; color:white; padding:15px; display:flex; align-items:center; }
.header img { width:60px; margin-right:15px; }
.container { max-width:500px; margin:30px auto; background:white; padding:25px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.2); }
h2 { text-align:center; color:#800000; margin-bottom:20px; }
form input { width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px; }
form input[type="file"] { padding:5px; }
button { width:100%; padding:12px; background:#800000; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer; margin-top:10px; }
button:hover { background:#a00000; }
.profile-preview { display:block; margin:10px auto; width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid #800000; }
button.delete-btn { background:#c00; margin-top:20px; }
button.delete-btn:hover { background:#e00; }
</style>
</head>
<body>

<div class="header">
    <img src="logo-new.png" alt="School Logo">
    <h1>ADUE International School</h1>
</div>

<div class="container">
    <h2>Edit Student</h2>
    <form id="editStudentForm">
        <input type="text" id="studentName" placeholder="Full Name" required>
        <input type="email" id="studentEmail" placeholder="Email" required>
        <input type="text" id="studentID" placeholder="Student ID" required>
        <input type="text" id="studentClass" placeholder="Class" required>
        <input type="text" id="studentYear" placeholder="Year" required>
        <input type="password" id="password" placeholder="Password" required>

        <!-- Profile Picture -->
        <label for="profilePictureInput">Profile Picture:</label>
        <input type="file" id="profilePictureInput" accept="image/*">
        <img id="profilePreview" class="profile-preview" src="default.png" alt="Profile Preview">

        <button type="submit">Save Changes</button>
        <button type="button" id="deleteBtn" class="delete-btn">Delete Student</button>
    </form>
</div>

<script>
let students = JSON.parse(localStorage.getItem('students')) || [];
let editIndex = parseInt(localStorage.getItem("editStudentIndex")) || 0;

const student = students[editIndex];

// Prefill form
document.getElementById("studentName").value = student.name;
document.getElementById("studentEmail").value = student.email;
document.getElementById("studentID").value = student.studentID;
document.getElementById("studentClass").value = student.studentClass;
document.getElementById("studentYear").value = student.studentYear;
document.getElementById("password").value = student.password;

const profileInput = document.getElementById("profilePictureInput");
const profilePreview = document.getElementById("profilePreview");
profilePreview.src = student.profilePicture || "default.png";

// Preview image
profileInput.addEventListener("change", function(){
    if(this.files.length>0){
        const reader = new FileReader();
        reader.onload = function(){ profilePreview.src = reader.result; }
        reader.readAsDataURL(this.files[0]);
    }
});

// Save changes
document.getElementById("editStudentForm").addEventListener("submit", function(e){
    e.preventDefault();
    const name = document.getElementById("studentName").value.trim();
    const email = document.getElementById("studentEmail").value.trim();
    const studentID = document.getElementById("studentID").value.trim();
    const studentClass = document.getElementById("studentClass").value.trim();
    const studentYear = document.getElementById("studentYear").value.trim();
    const password = document.getElementById("password").value;

    function saveChanges(profilePicture){
        students[editIndex] = { name, email, studentID, studentClass, studentYear, password, profilePicture };
        localStorage.setItem("students", JSON.stringify(students));
        alert("Student updated successfully!");
        window.location.href="admin_dashboard.html";
    }

    if(profileInput.files.length>0){
        const reader = new FileReader();
        reader.onload = function(){ saveChanges(reader.result); }
        reader.readAsDataURL(profileInput.files[0]);
    } else {
        saveChanges(student.profilePicture || "default.png");
    }
});

// Delete student
document.getElementById("deleteBtn").addEventListener("click", function(){
    if(confirm("Are you sure you want to delete this student?")){
        students.splice(editIndex, 1);
        localStorage.setItem("students", JSON.stringify(students));
        alert("Student deleted!");
        window.location.href="admin_dashboard.html";
    }
});
</script>

</body>
</html>
