<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Student - ADUE Portal</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h2>Edit Student</h2>

<form id="editStudentForm">
    <label>Full Name:</label>
    <input type="text" id="name" required><br>
    <label>Email:</label>
    <input type="email" id="email" required><br>
    <label>Student ID:</label>
    <input type="text" id="studentID" required><br>
    <label>Class:</label>
    <input type="text" id="studentClass" required><br>
    <label>Year:</label>
    <input type="text" id="studentYear" required><br>
    <label>Result:</label>
    <input type="text" id="result"><br>
    <label>Profile Picture:</label>
    <input type="file" id="profilePictureInput" accept="image/*"><br><br>
    <button type="submit">Save Changes</button>
</form>

<!-- Delete button at bottom -->
<button id="deleteBtn" style="margin-top:20px; background:#d9534f; color:white; padding:10px 20px;">Delete Student</button>

<script>
// Get student index from URL
const urlParams = new URLSearchParams(window.location.search);
const index = urlParams.get('index');
let students = JSON.parse(localStorage.getItem('students')) || [];
let student = students[index];

// Populate form
document.getElementById('name').value = student.name;
document.getElementById('email').value = student.email;
document.getElementById('studentID').value = student.studentID;
document.getElementById('studentClass').value = student.studentClass;
document.getElementById('studentYear').value = student.studentYear;
document.getElementById('result').value = student.result || '';

// Save changes
document.getElementById('editStudentForm').addEventListener('submit', function(e){
    e.preventDefault();
    student.name = document.getElementById('name').value;
    student.email = document.getElementById('email').value;
    student.studentID = document.getElementById('studentID').value;
    student.studentClass = document.getElementById('studentClass').value;
    student.studentYear = document.getElementById('studentYear').value;
    student.result = document.getElementById('result').value;

    // Handle profile picture
    const file = document.getElementById('profilePictureInput').files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(){
            student.profilePicture = reader.result;
            students[index] = student;
            localStorage.setItem('students', JSON.stringify(students));
            alert("Student updated!");
            window.location.href = 'admin_dashboard.html';
        }
        reader.readAsDataURL(file);
    } else {
        students[index] = student;
        localStorage.setItem('students', JSON.stringify(students));
        alert("Student updated!");
        window.location.href = 'admin_dashboard.html';
    }
});

// Delete student
document.getElementById('deleteBtn').addEventListener('click', function(){
    if(confirm("Are you sure you want to delete this student?")){
        students.splice(index,1);
        localStorage.setItem('students', JSON.stringify(students));
        alert("Student deleted!");
        window.location.href = 'admin_dashboard.html';
    }
});
</script>
</body>
</html>
