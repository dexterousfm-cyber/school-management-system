<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Teacher</title>
<link rel="stylesheet" href="styles.css">
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f9f9f9; }
.header { background:#800000; color:white; padding:15px; display:flex; align-items:center; }
.header img { width:60px; margin-right:15px; }
.container { max-width:500px; margin:30px auto; background:white; padding:25px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.2); }
h2 { text-align:center; color:#800000; margin-bottom:20px; }
form input { width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px; }
form input[type="file"] { padding:5px; }
button { width:100%; padding:12px; background:#800000; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer; margin-top:10px; }
button:hover { background:#a00000; }
.profile-preview { display:block; margin:10px auto; width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid #800000; }
button.delete-btn { background:#c00; margin-top:20px; }
button.delete-btn:hover { background:#e00; }
</style>
</head>
<body>

<div class="header">
    <img src="logo-new.png" alt="School Logo">
    <h1>ADUE International School</h1>
</div>

<div class="container">
    <h2>Edit Teacher</h2>
    <form id="editTeacherForm">
        <input type="text" id="teacherName" placeholder="Full Name" required>
        <input type="email" id="teacherEmail" placeholder="Email" required>
        <input type="text" id="teacherID" placeholder="Teacher ID" required>
        <input type="text" id="department" placeholder="Department" required>
        <input type="password" id="password" placeholder="Password" required>

        <!-- Profile Picture -->
        <label for="profilePictureInput">Profile Picture:</label>
        <input type="file" id="profilePictureInput" accept="image/*">
        <img id="profilePreview" class="profile-preview" src="default.png" alt="Profile Preview">

        <button type="submit">Save Changes</button>
        <button type="button" id="deleteBtn" class="delete-btn">Delete Teacher</button>
    </form>
</div>

<script>
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let editIndex = parseInt(localStorage.getItem("editTeacherIndex")) || 0;

const teacher = teachers[editIndex];

// Prefill form
document.getElementById("teacherName").value = teacher.name;
document.getElementById("teacherEmail").value = teacher.email;
document.getElementById("teacherID").value = teacher.teacherID;
document.getElementById("department").value = teacher.department;
document.getElementById("password").value = teacher.password;
const profileInput = document.getElementById("profilePictureInput");
const profilePreview = document.getElementById("profilePreview");
profilePreview.src = teacher.profilePicture || "default.png";

// Preview image when selected
profileInput.addEventListener("change", function(){
    if(this.files.length>0){
        const reader = new FileReader();
        reader.onload = function(){
            profilePreview.src = reader.result;
        }
        reader.readAsDataURL(this.files[0]);
    }
});

// Save changes
document.getElementById("editTeacherForm").addEventListener("submit", function(e){
    e.preventDefault();
    const name = document.getElementById("teacherName").value.trim();
    const email = document.getElementById("teacherEmail").value.trim();
    const teacherID = document.getElementById("teacherID").value.trim();
    const department = document.getElementById("department").value.trim();
    const password = document.getElementById("password").value;

    function saveChanges(profilePicture){
        teachers[editIndex] = { name, email, teacherID, department, password, profilePicture };
        localStorage.setItem("teachers", JSON.stringify(teachers));
        alert("Teacher updated successfully!");
        window.location.href="admin_dashboard.html";
    }

    if(profileInput.files.length>0){
        const reader = new FileReader();
        reader.onload = function(){ saveChanges(reader.result); }
        reader.readAsDataURL(profileInput.files[0]);
    } else {
        saveChanges(teacher.profilePicture || "default.png");
    }
});

// Delete teacher
document.getElementById("deleteBtn").addEventListener("click", function(){
    if(confirm("Are you sure you want to delete this teacher?")){
        teachers.splice(editIndex, 1);
        localStorage.setItem("teachers", JSON.stringify(teachers));
        alert("Teacher deleted!");
        window.location.href="admin_dashboard.html";
    }
});
</script>

</body>
</html>
