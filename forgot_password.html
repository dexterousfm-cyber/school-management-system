<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password - ADUE Portal</title>
<style>
body { font-family: Arial; background:#f4f4f4; }
.container {
    max-width:400px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 6px 20px rgba(0,0,0,0.2);
}
h2 { text-align:center; color:#722F37; }
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}
button {
    width:100%;
    padding:12px;
    background:#722F37;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
    <h2>Reset Password</h2>

    <form id="resetForm">
        <input type="text" id="emailOrID" placeholder="Enter Email or ID" required>
        <input type="password" id="newPassword" placeholder="New Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <button type="submit">Reset Password</button>
    </form>
</div>

<script>
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];

document.getElementById('resetForm').addEventListener('submit', function(e){
    e.preventDefault();

    const input = document.getElementById('emailOrID').value;
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmPassword').value;

    if(newPass !== confirmPass){
        alert("Passwords do not match!");
        return;
    }

    // Check teachers
    let userFound = false;

    teachers.forEach(t => {
        if(t.email === input || t.teacherID === input){
            t.password = newPass;
            userFound = true;
        }
    });

    // Check students
    students.forEach(s => {
        if(s.email === input || s.studentID === input){
            s.password = newPass;
            userFound = true;
        }
    });

    if(userFound){
        localStorage.setItem('teachers', JSON.stringify(teachers));
        localStorage.setItem('students', JSON.stringify(students));
        alert("Password reset successful!");
        window.location.href = "index.html";
    } else {
        alert("User not found!");
    }
});
</script>

</body>
</html>
