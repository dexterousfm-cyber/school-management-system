<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Portal Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <div class="header-content">
        <img src="logo-new.png" alt="Header Logo" class="logo-header">
        <h1>ADUE International School</h1>
    </div>
</div>

<div class="login-wrapper">
    <div class="login-box">
        <img src="login-logo.png" alt="Login Box Logo" class="logo-box">

        <form id="loginForm">
            <input type="text" id="userId" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="#">Contact IT Support</a>
            </div>
        </form>
    </div>
</div>

<script>
const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(e){
    e.preventDefault();

    const userId = document.getElementById("userId").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    let user = null;

    // 1️⃣ Check admin (hardcoded)
    const admins = [
        { email: "admin@adue.com", password: "12345678", redirect: "admin_dashboard.html" }
    ];
    user = admins.find(a => a.email.toLowerCase() === userId && a.password === password);

    // 2️⃣ Check teachers in localStorage
    if(!user){
        const teachers = JSON.parse(localStorage.getItem('teachers')) || [];
        const teacher = teachers.find(t => t.email.toLowerCase() === userId && t.password === password);
        if(teacher){
            user = { redirect: "teacher_dashboard.html" };
        }
    }

    // 3️⃣ Check students in localStorage
    if(!user){
        const students = JSON.parse(localStorage.getItem('students')) || [];
        const student = students.find(s => s.email.toLowerCase() === userId && s.password === password);
        if(student){
            user = { redirect: "student_dashboard.html" };
        }
    }

    if(user){
        alert("Login successful!");
        window.location.href = user.redirect;
    } else {
        alert("Invalid login credentials!");
    }
});
</script>

</body>
</html>
