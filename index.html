<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Portal Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <div class="header-content">
        <img src="logo-new.png" class="logo-header">
        <h1>ADUE International School</h1>
    </div>
</div>

<div class="login-wrapper">
    <div class="login-box">
        <img src="login-logo.png" class="logo-box">

        <form id="loginForm">
            <input type="text" id="userId" placeholder="Email or ID" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div class="links">
                <a href="forgot_password.html">Forgot Password?</a>
            </div>
        </form>
    </div>
</div>

<script>
// --- Ensure Admin Exists ---
if(!localStorage.getItem('admins')){
    localStorage.setItem('admins', JSON.stringify([
        { email: "admin@adue.com", password: "12345678", name: "Admin", profilePicture: "admin.png" }
    ]));
}

// --- Load users ---
let admins = JSON.parse(localStorage.getItem('admins')) || [];
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];

document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const input = document.getElementById("userId").value.trim();
    const password = document.getElementById("password").value;

    // --- ADMIN LOGIN ---
    const adminIndex = admins.findIndex(a => a.email === input && a.password === password);
    if(adminIndex !== -1){
        localStorage.setItem("currentAdminIndex", adminIndex);
        window.location.href = "admin_dashboard.html";
        return;
    }

    // --- TEACHER LOGIN ---
    const teacherIndex = teachers.findIndex(t => (t.email === input || t.teacherID === input) && t.password === password);
    if(teacherIndex !== -1){
        localStorage.setItem("currentTeacherIndex", teacherIndex);
        window.location.href = "teacher_dashboard.html";
        return;
    }

    // --- STUDENT LOGIN ---
    const studentIndex = students.findIndex(s => (s.email === input || s.studentID === input) && s.password === password);
    if(studentIndex !== -1){
        localStorage.setItem("currentStudentIndex", studentIndex);
        window.location.href = "student_dashboard.html";
        return;
    }

    alert("Invalid login details!");
});
</script>

</body>
</html>
