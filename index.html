<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Portal Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <div class="header-content">
        <img src="logo-new.png" alt="Header Logo" class="logo-header">
        <h1>ADUE International School</h1>
    </div>
</div>

<div class="login-wrapper">
    <div class="login-box">
        <img src="login-logo.png" alt="Login Box Logo" class="logo-box">

        <form id="loginForm">
            <input type="text" id="userId" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="#">Contact IT Support</a>
            </div>
        </form>
    </div>
</div>

<script>
const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(e) {
    e.preventDefault();
    const userId = document.getElementById("userId").value.trim();
    const password = document.getElementById("password").value.trim();

    const admins = JSON.parse(localStorage.getItem('admins')) || [{email:"admin@adue.com", password:"12345678"}];
    const teachers = JSON.parse(localStorage.getItem('teachers')) || [];
    const students = JSON.parse(localStorage.getItem('students')) || [];

    let user = admins.find(a => a.email === userId && a.password === password);
    if(user){ window.location.href = "admin_dashboard.html"; return; }

    user = teachers.find(t => t.email === userId && t.password === password);
    if(user){ 
        localStorage.setItem('currentTeacherEmail', user.email);
        window.location.href = "teacher_dashboard.html"; 
        return; 
    }

    user = students.find(s => s.email === userId && s.password === password);
    if(user){ 
        localStorage.setItem('currentStudentEmail', user.email);
        window.location.href = "student_dashboard.html"; 
        return; 
    }

    alert("Invalid login credentials!");
});
</script>

</body>
</html>
