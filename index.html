<!DOCTYPE html>
<html>
<head>
    <title>ADUE International School</title>
    <style>
        body { font-family: Arial, sans-serif; text-align:center; padding-top:50px; background:#f4f4f4; }
        button { padding:10px 20px; font-size:16px; }
    </style>
</head>
<body>

<h1>Welcome to ADUE International School Portal</h1>
<p>Manage Students and Teachers easily</p>

<button onclick="goLogin()">Go to Login</button>

<script>
function goLogin(){
    window.location.href = "login.html";
}

// Initialize admin account if it doesn't exist
let users = JSON.parse(localStorage.getItem("users")) || [];
if(!users.find(u => u.role === "admin")){
    users.push({
        name: "Admin User",
        email: "admin@adue.edu",
        password: "admin123",
        role: "admin"
    });
    localStorage.setItem("users", JSON.stringify(users));
}
</script>

</body>
</html>
