<div class="login-box">
    <!-- Small logo on top of the box -->
    <img src="login-logo.png" alt="School Logo" class="logo-box">

    <form id="loginForm">
        <input type="text" id="studentId" placeholder="Student/Staff ID" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>

        <div class="links">
            <a href="#">Forgot Password?</a>
            <a href="#">Contact IT Support</a>
        </div>
    </form>
</div>
