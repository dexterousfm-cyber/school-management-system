<!DOCTYPE html>
<html>
<head>
    <title>ADUE Portal Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px 0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background-color: #45a049; }
        .register-link {
            margin-top: 10px;
            text-align: center;
        }
        .register-link a {
            color: green;
            font-weight: bold;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        #status {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h1 style="text-align:center;">ADUE Portal Login</h1>

<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<button onclick="login()">Login</button>

<p id="status"></p>

<p style="text-align:center;">Don't have an account? Contact Admin to create one.</p>

<!-- Teacher registration button -->
<div class="register-link">
    Are you a teacher? <a href="register_teacher.html">Register here</a>
</div>

<script>
// Get users from localStorage
let users = JSON.parse(localStorage.getItem("users")) || [];

// Login function
function login(){
    let email = document.getElementById("loginEmail").value.trim();
    let password = document.getElementById("loginPassword").value.trim();

    if(!email || !password){
        alert("Please fill all fields");
        return;
    }

    // Find user
    let user = users.find(u => u.email === email && u.password === password);

    if(!user){
        document.getElementById("status").innerText = "Invalid email or password";
        return;
    }

    // Save logged-in user
    localStorage.setItem("loggedInUser", JSON.stringify(user));

    // Redirect based on role
    if(user.role === "admin"){
        window.location.href = "admin_dashboard.html";
    } else if(user.role === "teacher"){
        window.location.href = "teacher_dashboard.html";
    } else if(user.role === "student"){
        window.location.href = "student_dashboard.html";
    } else {
        alert("Unknown role");
    }
}
</script>

</body>
</html>
