<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Portal Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Top header with logo and school name -->
<div class="header">
    <div class="header-content">
        <img src="logo.png" alt="School Logo" class="logo-header">
        <h1>ADUE International School</h1>
    </div>
</div>

<!-- Centered Login Box -->
<div class="login-box">
    <!-- Small logo inside the login box -->
    <img src="logo.png" alt="Logo" class="logo-box">

    <form id="loginForm">
        <input type="text" id="studentId" placeholder="Student/Staff ID" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>

        <!-- Links below inputs -->
        <div class="links">
            <a href="#">Forgot Password?</a>
            <a href="#">Contact IT Support</a>
        </div>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
