<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Portal Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Top header -->
<div class="header">
    <div class="header-content">
        <img src="logo-new.png" alt="Header Logo" class="logo-header">
        <h1>ADUE International School</h1>
    </div>
</div>

<!-- Wrapper to center login box vertically & horizontally -->
<div class="login-wrapper">
    <div class="login-box">
        <!-- Logo on top of the box -->
        <img src="login-logo.png" alt="Login Box Logo" class="logo-box">

        <form id="loginForm">
            <input type="text" id="studentId" placeholder="Student/Staff ID" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>

            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="#">Contact IT Support</a>
            </div>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
