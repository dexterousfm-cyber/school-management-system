<!DOCTYPE html>
<html>
<head>
    <title>ADUE Portal Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            text-align: center;
        }
        input { width: 90%; padding: 8px; margin: 10px 0; }
        button { width: 95%; padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .teacher-register { margin-top: 20px; display: block; font-weight: bold; color: green; text-decoration: none; }
    </style>
</head>
<body>

<h2>ADUE Portal Login</h2>

<input type="email" id="loginEmail" placeholder="Email"><br>
<input type="password" id="loginPassword" placeholder="Password"><br>
<button onclick="login()">Login</button>

<p id="status" style="color:red;"></p>

<p>Don't have an account? Contact Admin.</p>

<!-- Teacher registration link -->
<a class="teacher-register" href="register_teacher.html">Register as Teacher</a>

<script>
// Get users from localStorage
let users = JSON.parse(localStorage.getItem("users")) || [];

function login(){
    let email = document.getElementById("loginEmail").value.trim();
    let password = document.getElementById("loginPassword").value.trim();

    if(!email || !password){
        alert("Fill all fields");
        return;
    }

    let user = users.find(u => u.email === email && u.password === password);

    if(!user){
        document.getElementById("status").innerText = "Invalid email or password";
        return;
    }

    localStorage.setItem("loggedInUser", JSON.stringify(user));

    if(user.role === "admin"){
        window.location.href = "admin_dashboard.html";
    } else if(user.role === "teacher"){
        window.location.href = "teacher_dashboard.html";
    } else if(user.role === "student"){
        window.location.href = "student_dashboard.html";
    } else {
        alert("Unknown role");
    }
}
</script>

</body>
</html>
