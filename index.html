<script>
// Initialize localStorage arrays if they don't exist
if(!localStorage.getItem('admins')){
    localStorage.setItem('admins', JSON.stringify([
        { email: "admin@adue.com", password: "12345678", name: "Admin", profilePicture: "admin.png" }
    ]));
}

if(!localStorage.getItem('teachers')){
    localStorage.setItem('teachers', JSON.stringify([]));
}

if(!localStorage.getItem('students')){
    localStorage.setItem('students', JSON.stringify([]));
}

// Load arrays from localStorage
let admins = JSON.parse(localStorage.getItem('admins'));
let teachers = JSON.parse(localStorage.getItem('teachers'));
let students = JSON.parse(localStorage.getItem('students'));

document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const input = document.getElementById("userId").value.trim();
    const password = document.getElementById("password").value;

    // ADMIN login
    let adminIndex = admins.findIndex(a => a.email === input && a.password === password);
    if(adminIndex !== -1){
        localStorage.setItem("currentAdminIndex", adminIndex);
        window.location.href = "admin_dashboard.html";
        return;
    }

    // TEACHER login
    let teacherIndex = teachers.findIndex(t => (t.email === input || t.teacherID === input) && t.password === password);
    if(teacherIndex !== -1){
        localStorage.setItem("currentTeacherIndex", teacherIndex);
        window.location.href = "teacher_dashboard.html";
        return;
    }

    // STUDENT login
    let studentIndex = students.findIndex(s => (s.email === input || s.studentID === input) && s.password === password);
    if(studentIndex !== -1){
        localStorage.setItem("currentStudentIndex", studentIndex);
        window.location.href = "student_dashboard.html";
        return;
    }

    // Invalid login
    alert("Invalid login details!");
});
</script>
