<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Portal Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Login Container -->
<div class="container">
    <!-- Logo -->
    <div class="logo">
        <img src="logo.png" alt="ADUE Logo" height="100">
    </div>

    <!-- Portal Heading -->
    <h1>ADUE Portal</h1>

    <!-- Login Form -->
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p><strong>All accounts are created by Admin</strong></p>
</div>

<script src="script.js"></script>
</body>
</html>
