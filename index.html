<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Portal Login</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box {
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    width:350px;
    text-align:center;
}

.login-box h2 {
    margin-bottom:20px;
    color:#800000;
}

.login-box input {
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.login-box button {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#800000;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.login-box button:hover {
    background:#a00000;
}

.links {
    margin-top:10px;
}
.links a {
    text-decoration:none;
    color:#800000;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>ADUE Portal Login</h2>
    <form id="loginForm">
        <input type="text" id="userId" placeholder="Email or ID" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <div class="links">
            <a href="#">Forgot Password?</a>
        </div>
    </form>
</div>

<script>
// Initialize admin if not already
if(!localStorage.getItem('admins')){
    localStorage.setItem('admins', JSON.stringify([
        { email: "admin@adue.com", password: "12345678", name: "Admin", profilePicture: "" }
    ]));
}

// Load arrays
let admins = JSON.parse(localStorage.getItem('admins')) || [];
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];

document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const input = document.getElementById("userId").value.trim();
    const password = document.getElementById("password").value;

    // Admin
    for(let i=0;i<admins.length;i++){
        if(admins[i].email === input && admins[i].password === password){
            localStorage.setItem("currentAdminIndex", i);
            alert("Admin login successful! Redirecting...");
            return;
        }
    }

    // Teacher
    for(let i=0;i<teachers.length;i++){
        if((teachers[i].email === input || teachers[i].teacherID === input) && teachers[i].password === password){
            localStorage.setItem("currentTeacherIndex", i);
            alert("Teacher login successful! Redirecting...");
            return;
        }
    }

    // Student
    for(let i=0;i<students.length;i++){
        if((students[i].email === input || students[i].studentID === input) && students[i].password === password){
            localStorage.setItem("currentStudentIndex", i);
            alert("Student login successful! Redirecting...");
            return;
        }
    }

    alert("Invalid login details!");
});
</script>

</body>
</html>
