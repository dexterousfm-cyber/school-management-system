<!DOCTYPE html>
<html>
<head>
    <title>Invite Admin - ADUE Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background:#f4f4f4; text-align:center; padding:50px; }
        input, button { padding:10px; margin:10px; font-size:16px; width:300px; }
        button { cursor:pointer; }
        p { font-weight:bold; color:green; }
    </style>
</head>
<body>

<h1>Invite New Admin</h1>

<input type="email" id="adminEmail" placeholder="Enter new admin email"><br>
<button onclick="sendInvite()">Send Invite</button><br><br>
<p id="status"></p>
<button onclick="window.location.href='dashboard.html'">Back to Dashboard</button>

<script>
    // Initialize EmailJS with your correct public key
    emailjs.init("Hc0Y5G5YepKUjU2Wg");

    // Ensure only admins can access
    let loggedIn = JSON.parse(localStorage.getItem("loggedInUser"));
    if(!loggedIn || loggedIn.role !== "admin"){
        alert("Access denied! Only admins can send invites.");
        window.location.href = "dashboard.html";
    }

    function sendInvite(){
        let email = document.getElementById("adminEmail").value.trim();
        if(!email){
            alert("Please enter an email!");
            return;
        }

        // Generate registration link dynamically
        let link = `${window.location.origin}/register_admin.html?email=${encodeURIComponent(email)}`;

        // Send the email using EmailJS
        emailjs.send(
            "service_m1r9p09",    // Your Gmail service ID
            "template_839q9a6",   // Your Admin Invite template ID
            {
                to_email: email,           // Recipient email
                invite_link: link,         // Registration link
                to_name: email.split("@")[0] // Optional: first part of email as name
            }
        ).then(function(response){
            document.getElementById("status").innerText = "Invite sent successfully to " + email;
        }, function(error){
            document.getElementById("status").innerText = "Failed to send invite: " + JSON.stringify(error);
            console.error("EmailJS error:", error);
        });
    }
</script>

</body>
</html>
