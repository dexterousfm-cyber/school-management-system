<!DOCTYPE html>
<html>
<head>
    <title>ADUE Portal Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align:center; padding-top:50px;}
        input { padding:10px; margin:10px; width:200px;}
        button { padding:10px 20px;}
    </style>
</head>
<body>

<h1>ADUE International School - Login</h1>

<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<script>
function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // Hardcoded users
    const users = [
        {email:"admin@adue.edu", password:"admin123", role:"admin"},
        {email:"student1@adue.edu", password:"student123", role:"student"},
        {email:"teacher1@adue.edu", password:"teacher123", role:"teacher"}
    ];

    const user = users.find(u => u.email === email && u.password === password);

    if(user){
        // Store logged-in user as string
        localStorage.setItem("loggedInUser", JSON.stringify(user));
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid email or password");
    }
}
</script>

</body>
</html>
