<h2>Student Registration</h2>
<input type="text" id="studentName" placeholder="Full Name"><br>
<input type="email" id="studentEmail" placeholder="Email"><br>
<select id="studentSubject">
    <option value="">Select Subject</option>
    <option value="Math">Math</option>
    <option value="English">English</option>
    <option value="Science">Science</option>
</select><br>
<button onclick="registerStudent()">Register</button>
<p id="studentStatus"></p>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

function registerStudent(){
    let name = document.getElementById("studentName").value.trim();
    let email = document.getElementById("studentEmail").value.trim();
    let subject = document.getElementById("studentSubject").value;

    if(!name || !email || !subject){
        alert("All fields are required!");
        return;
    }

    if(users.some(u => u.email === email)){
        document.getElementById("studentStatus").innerText = "Student with this email already exists!";
        return;
    }

    // Automatically assign to first teacher of that subject
    let teacher = users.find(u => u.role === "teacher" && u.subject === subject);
    if(!teacher){
        document.getElementById("studentStatus").innerText = "No teacher registered for this subject yet!";
        return;
    }

    users.push({name, email, role:"student", teacherEmail:teacher.email, subject});
    localStorage.setItem("users", JSON.stringify(users));
    document.getElementById("studentStatus").innerText = `Registered successfully! Assigned to teacher: ${teacher.name}`;
    document.getElementById("studentName").value = "";
    document.getElementById("studentEmail").value = "";
    document.getElementById("studentSubject").value = "";
}
</script>
