<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Student</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <div class="logo"><img src="logo-new.png" alt="Logo"></div>
    <div class="profile">
        <img src="admin.png" alt="Admin">
        <span>Welcome Admin</span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <h2>Register Student</h2>
    <div class="form-container">
        <input type="text" id="studentName" placeholder="Name">
        <input type="email" id="studentEmail" placeholder="Email">
        <input type="text" id="studentID" placeholder="Student ID">
        <input type="text" id="studentClass" placeholder="Class">
        <input type="text" id="studentYear" placeholder="Year">
        <input type="password" id="studentPassword" placeholder="Password">
        <input type="file" id="studentPic">
        <button onclick="registerStudent()">Register Student</button>
    </div>

    <h3>All Students</h3>
    <table id="studentsTable"></table>
</div>

<script src="script.js"></script>
<script>
// Render student table
function renderStudentsTable(){
    const table = document.getElementById('studentsTable');
    let html = `<tr>
        <th>Picture</th><th>Name</th><th>Email</th><th>Student ID</th><th>Class</th><th>Year</th><th>Password</th><th>Edit</th><th>Delete</th>
    </tr>`;
    students.forEach((s,i)=>{
        html += `<tr>
            <td><img src="${s.profilePicture}" style="width:50px;height:50px;border-radius:50%;"></td>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.studentID}</td>
            <td>${s.studentClass}</td>
            <td>${s.studentYear}</td>
            <td>•••••••</td>
            <td><button onclick="editStudentPrompt(${i})">Edit</button></td>
            <td><button onclick="deleteStudent(${i}); renderStudentsTable();">Delete</button></td>
        </tr>`;
    });
    table.innerHTML = html;
}

// Register student
function registerStudent(){
    let name = document.getElementById('studentName').value;
    let email = document.getElementById('studentEmail').value;
    let id = document.getElementById('studentID').value;
    let studentClass = document.getElementById('studentClass').value;
    let year = document.getElementById('studentYear').value;
    let password = document.getElementById('studentPassword').value;
    let file = document.getElementById('studentPic').files[0];

    if(!name || !email || !password){ alert("Name, Email, and Password are required"); return; }

    let teacherID = localStorage.getItem('currentTeacherID') || null; // for teachers

    let reader = new FileReader();
    reader.onload = function(e){
        let pic = e.target.result;
        registerStudentAdmin(name,email,id,studentClass,year,password,pic,teacherID);
        renderStudentsTable();
        alert("Student registered successfully!");
    }
    if(file) reader.readAsDataURL(file);
    else{
        registerStudentAdmin(name,email,id,studentClass,year,password,null,teacherID);
        renderStudentsTable();
        alert("Student registered successfully!");
    }
}

// Edit student prompt
function editStudentPrompt(i){
    let s = students[i];
    let newName = prompt("Name:", s.name) || s.name;
    let newEmail = prompt("Email:", s.email) || s.email;
    let newClass = prompt("Class:", s.studentClass) || s.studentClass;
    let newYear = prompt("Year:", s.studentYear) || s.studentYear;
    let newPassword = prompt("Password (leave blank to keep hidden):","");
    editStudent(i,{
        name: newName,
        email: newEmail,
        studentClass: newClass,
        studentYear: newYear,
        password: newPassword || s.password
    });
    renderStudentsTable();
}

// Initial render
renderStudentsTable();
</script>
</body>
</html>
