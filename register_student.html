<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Student - ADUE Portal</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <img src="logo-new.png" alt="Logo">
    <h1>Register Student</h1>
</div>

<div class="registration-wrapper">
    <h2>Student Information</h2>
    <form id="studentForm">
        <input type="text" id="studentName" placeholder="Full Name" required>
        <input type="email" id="studentEmail" placeholder="Email" required>
        <input type="text" id="studentID" placeholder="Student ID" required>
        <input type="text" id="studentClass" placeholder="Class" required>
        <input type="text" id="studentYear" placeholder="Year" required>
        <input type="text" id="teacherID" placeholder="Teacher ID" required>
        <input type="password" id="password" placeholder="Password" required>
        <input type="file" id="profilePicture">
        <button type="submit">Register Student</button>
    </form>
    <div class="links"><a href="admin_dashboard.html">Back to Dashboard</a></div>
</div>

<script>
let students = JSON.parse(localStorage.getItem('students')) || [];
document.getElementById('studentForm').addEventListener('submit', function(e){
    e.preventDefault();
    const name=document.getElementById('studentName').value;
    const email=document.getElementById('studentEmail').value;
    const studentID=document.getElementById('studentID').value;
    const studentClass=document.getElementById('studentClass').value;
    const studentYear=document.getElementById('studentYear').value;
    const teacherID=document.getElementById('teacherID').value;
    const password=document.getElementById('password').value;
    const file=document.getElementById('profilePicture').files[0];
    let reader=new FileReader();
    reader.onload = function(){
        students.push({name,email,studentID,studentClass,studentYear,teacherID,password,profilePicture: reader.result});
        localStorage.setItem('students', JSON.stringify(students));
        alert("Student registered!");
        window.location.href='admin_dashboard.html';
    };
    if(file) reader.readAsDataURL(file);
    else {students.push({name,email,studentID,studentClass,studentYear,teacherID,password,profilePicture:null}); localStorage.setItem('students',JSON.stringify(students)); alert("Student registered!"); window.location.href='admin_dashboard.html';}
});
</script>
</body>
</html>
