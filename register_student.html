<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Student</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h2>Register Student</h2>
  <form id="studentForm">
    <input type="text" id="studentName" placeholder="Full Name" required>
    <input type="email" id="studentEmail" placeholder="Email" required>
    <input type="text" id="studentID" placeholder="Student ID" required>
    <input type="password" id="studentPassword" placeholder="Password" required>
    <input type="file" id="studentPic">
    <button type="submit">Register Student</button>
  </form>
</div>

<script>
document.getElementById("studentForm").addEventListener("submit", function(e){
    e.preventDefault();

    let students = JSON.parse(localStorage.getItem('students')) || [];
    
    let name = document.getElementById("studentName").value;
    let email = document.getElementById("studentEmail").value;
    let studentID = document.getElementById("studentID").value;
    let password = document.getElementById("studentPassword").value;
    let file = document.getElementById("studentPic").files[0];

    if (!name || !email || !studentID || !password) {
        alert("All fields are required!");
        return;
    }

    function saveStudent(pic){
        students.push({name,email,studentID,password,profilePicture: pic || "student.png"});
        localStorage.setItem('students', JSON.stringify(students));
        alert("Student registered successfully!");
        document.getElementById("studentForm").reset();
    }

    if(file){
        let reader = new FileReader();
        reader.onload = function(e){
            saveStudent(e.target.result);
        }
        reader.readAsDataURL(file);
    } else {
        saveStudent();
    }
});
</script>

</body>
</html>
