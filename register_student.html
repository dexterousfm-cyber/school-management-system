<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Student</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h2>Register Student</h2>
    <form id="studentForm">
        <input type="text" id="studentName" placeholder="Name" required>
        <input type="email" id="studentEmail" placeholder="Email" required>
        <input type="text" id="studentID" placeholder="Student ID" required>
        <input type="text" id="studentClass" placeholder="Class" required>
        <input type="text" id="studentYear" placeholder="Year" required>
        <input type="password" id="password" placeholder="Password" required>
        <input type="file" id="profilePictureInput" accept="image/*">
        <button type="submit">Register</button>
    </form>
</div>

<script>
let students = JSON.parse(localStorage.getItem('students')) || [];

document.getElementById("studentForm").addEventListener("submit", function(e){
    e.preventDefault();
    const name = document.getElementById("studentName").value;
    const email = document.getElementById("studentEmail").value;
    const studentID = document.getElementById("studentID").value;
    const studentClass = document.getElementById("studentClass").value;
    const studentYear = document.getElementById("studentYear").value;
    const password = document.getElementById("password").value;
    const fileInput = document.getElementById("profilePictureInput");

    if(fileInput.files.length>0){
        const reader = new FileReader();
        reader.onload = function(){ saveStudent(reader.result); }
        reader.readAsDataURL(fileInput.files[0]);
    } else { saveStudent(""); }

    function saveStudent(profilePicture){
        students.push({ name, email, studentID, studentClass, studentYear, password, result:"", profilePicture });
        localStorage.setItem("students", JSON.stringify(students));
        alert("Student Registered Successfully!");
        document.getElementById("studentForm").reset();
    }
});
</script>
</body>
</html>
