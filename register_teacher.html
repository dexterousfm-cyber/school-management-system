<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Teacher</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h2>Register Teacher</h2>
    <form id="teacherForm">
        <input type="text" id="teacherName" placeholder="Name" required>
        <input type="email" id="teacherEmail" placeholder="Email" required>
        <input type="text" id="teacherID" placeholder="Teacher ID" required>
        <input type="text" id="department" placeholder="Department" required>
        <input type="password" id="password" placeholder="Password" required>
        <input type="file" id="profilePictureInput" accept="image/*">
        <button type="submit">Register</button>
    </form>
</div>

<script>
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];

document.getElementById("teacherForm").addEventListener("submit", function(e){
    e.preventDefault();
    const name = document.getElementById("teacherName").value;
    const email = document.getElementById("teacherEmail").value;
    const teacherID = document.getElementById("teacherID").value;
    const department = document.getElementById("department").value;
    const password = document.getElementById("password").value;
    const fileInput = document.getElementById("profilePictureInput");

    if(fileInput.files.length>0){
        const reader = new FileReader();
        reader.onload = function(){ saveTeacher(reader.result); }
        reader.readAsDataURL(fileInput.files[0]);
    } else { saveTeacher(""); }

    function saveTeacher(profilePicture){
        teachers.push({ name, email, teacherID, department, password, profilePicture });
        localStorage.setItem("teachers", JSON.stringify(teachers));
        alert("Teacher Registered Successfully!");
        document.getElementById("teacherForm").reset();
    }
});
</script>
</body>
</html>
