<button class="primary" onclick="openTeacherForm()">Register Teacher</button>

<div id="teacherFormModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
  <div style="background:white; padding:20px; border-radius:10px; width:400px;">
    <h3>Register Teacher</h3>
    <label>Name: <input type="text" id="teacherNameInput"></label><br><br>
    <label>Email: <input type="email" id="teacherEmailInput"></label><br><br>
    <label>Teacher ID: <input type="text" id="teacherIDInput"></label><br><br>
    <label>Department: <input type="text" id="teacherDeptInput"></label><br><br>
    <label>Profile Picture: <input type="file" id="teacherPicInput"></label><br><br>
    <button onclick="registerTeacher()">Register</button>
    <button onclick="closeTeacherForm()">Cancel</button>
  </div>
</div>

<script>
function openTeacherForm(){ document.getElementById('teacherFormModal').style.display='flex'; }
function closeTeacherForm(){ document.getElementById('teacherFormModal').style.display='none'; }

function registerTeacher(){
    let name = document.getElementById('teacherNameInput').value;
    let email = document.getElementById('teacherEmailInput').value;
    let id = document.getElementById('teacherIDInput').value;
    let dept = document.getElementById('teacherDeptInput').value;
    let file = document.getElementById('teacherPicInput').files[0];
    
    let reader = new FileReader();
    reader.onload = function(e){
        let pic = e.target.result;
        teachers.push({profilePicture: pic, name:name, email:email, teacherID:id, department:dept});
        renderTeachersTable();
        closeTeacherForm();
    }
    if(file) reader.readAsDataURL(file);
}
        </script>
