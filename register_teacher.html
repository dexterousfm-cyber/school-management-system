<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Teacher - ADUE Portal</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <img src="logo-new.png" alt="Logo">
    <h1>Register Teacher</h1>
</div>

<div class="registration-wrapper">
    <h2>Teacher Information</h2>
    <form id="teacherForm">
        <input type="text" id="teacherName" placeholder="Full Name" required>
        <input type="email" id="teacherEmail" placeholder="Email" required>
        <input type="text" id="teacherID" placeholder="Teacher ID" required>
        <input type="text" id="department" placeholder="Department" required>
        <input type="password" id="password" placeholder="Password" required>
        <input type="file" id="profilePicture">
        <button type="submit">Register Teacher</button>
    </form>
    <div class="links"><a href="admin_dashboard.html">Back to Dashboard</a></div>
</div>

<script>
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
document.getElementById('teacherForm').addEventListener('submit', function(e){
    e.preventDefault();
    const name=document.getElementById('teacherName').value;
    const email=document.getElementById('teacherEmail').value;
    const teacherID=document.getElementById('teacherID').value;
    const department=document.getElementById('department').value;
    const password=document.getElementById('password').value;
    const file=document.getElementById('profilePicture').files[0];
    let reader=new FileReader();
    reader.onload = function(){
        teachers.push({name,email,teacherID,department,password,profilePicture: reader.result});
        localStorage.setItem('teachers', JSON.stringify(teachers));
        alert("Teacher registered!");
        window.location.href='admin_dashboard.html';
    };
    if(file) reader.readAsDataURL(file);
    else {teachers.push({name,email,teacherID,department,password,profilePicture:null}); localStorage.setItem('teachers',JSON.stringify(teachers)); alert("Teacher registered!"); window.location.href='admin_dashboard.html';}
});
</script>
</body>
</html>
