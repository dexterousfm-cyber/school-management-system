<!DOCTYPE html>
<html>
<head>
    <title>Teacher Registration - ADUE Portal</title>
</head>
<body>

<h1>Register as Teacher</h1>

<!-- Teacher registration form -->
<input type="text" id="name" placeholder="Full Name"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="registerTeacher()">Register</button>

<p id="status"></p>

<p>Already have an account? <a href="index.html">Login here</a></p>

<script>
// Get existing users from localStorage
let users = JSON.parse(localStorage.getItem("users")) || [];

// Register function
function registerTeacher(){
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    // Validation
    if(!name || !email || !password){
        alert("Please fill all fields");
        return;
    }

    // Check if email already exists
    if(users.find(u => u.email === email)){
        alert("Email already registered");
        return;
    }

    // Create teacher object
    let teacher = {
        name: name,
        email: email,
        password: password,
        role: "teacher"
    };

    // Save teacher to users array
    users.push(teacher);
    localStorage.setItem("users", JSON.stringify(users));

    // Show success message
    document.getElementById("status").innerText = "Teacher registered successfully! Redirecting to login...";

    // Redirect to login page after 1.5 seconds
    setTimeout(()=>{
        window.location.href = "index.html";
    }, 1500);
}
</script>

</body>
</html>
