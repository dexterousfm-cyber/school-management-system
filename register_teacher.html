<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Teacher</title>
<link rel="stylesheet" href="styles.css">
<style>
body { font-family: Arial, sans-serif; background: #f5f5f5; margin:0; }
.header { display:flex; align-items:center; padding:15px 30px; background:#800000; color:white; }
.header img { width:100px; margin-right:20px; }
.container { max-width:500px; margin:50px auto; background:white; padding:30px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.2);}
h2 { text-align:center; color:#800000; }
input[type=text], input[type=email], input[type=password], input[type=file] {
  width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px;
}
button { width:100%; padding:10px; background:#800000; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer; margin-top:10px; }
button:hover { background:#a00000; }
.show-password { display:flex; align-items:center; margin:5px 0; }
</style>
</head>
<body>

<div class="header">
    <img src="logo-new.png" alt="Logo">
    <h1>Register Teacher</h1>
</div>

<div class="container">
    <h2>Teacher Registration</h2>
    <input type="text" id="teacherName" placeholder="Full Name">
    <input type="email" id="teacherEmail" placeholder="Email">
    <input type="text" id="teacherID" placeholder="Teacher ID">
    <input type="text" id="teacherDept" placeholder="Department">
    <input type="password" id="teacherPassword" placeholder="Password">
    <div class="show-password">
        <input type="checkbox" id="toggleTeacherPassword"> Show Password
    </div>
    <input type="file" id="teacherPic">
    <button onclick="registerTeacher()">Register Teacher</button>
</div>

<script>
function registerTeacher(){
    const name = document.getElementById('teacherName').value.trim();
    const email = document.getElementById('teacherEmail').value.trim();
    const id = document.getElementById('teacherID').value.trim();
    const dept = document.getElementById('teacherDept').value.trim();
    const password = document.getElementById('teacherPassword').value;
    const picFile = document.getElementById('teacherPic').files[0];

    if(!name || !email || !id || !password){ alert('Name, Email, ID, and Password are required'); return; }

    let reader = new FileReader();
    reader.onload = function(e){
        const pic = e.target.result;
        saveTeacher(name,email,id,dept,password,pic);
    }
    if(picFile) reader.readAsDataURL(picFile);
    else saveTeacher(name,email,id,dept,password,'teacher.png');
}

function saveTeacher(name,email,id,dept,password,pic){
    let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
    teachers.push({name,email,teacherID:id,department:dept,password,profilePicture:pic});
    localStorage.setItem('teachers', JSON.stringify(teachers));
    alert('Teacher registered successfully!');
    // Clear fields
    document.getElementById('teacherName').value = '';
    document.getElementById('teacherEmail').value = '';
    document.getElementById('teacherID').value = '';
    document.getElementById('teacherDept').value = '';
    document.getElementById('teacherPassword').value = '';
    document.getElementById('teacherPic').value = '';
}

// Toggle password visibility
document.getElementById('toggleTeacherPassword').addEventListener('change', function(){
    const pwd = document.getElementById('teacherPassword');
    pwd.type = this.checked ? 'text' : 'password';
});
</script>

</body>
</html>
