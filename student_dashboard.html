<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard - ADUE Portal</title>
<link rel="stylesheet" href="styles.css">
<style>
.header { background-color:#722F37; padding:20px; color:white; display:flex; align-items:center; justify-content:space-between; }
.header img { width:150px; height:150px; border-radius:50%; border:3px solid white; margin-right:20px; }
.logout-btn { background-color:white; color:#722F37; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:bold; }
.logout-btn:hover { opacity:0.9; }
#welcome { text-align:center; margin:20px; color:#722F37; font-size:20px; }
</style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center;">
        <img id="studentLogo" src="default-student.png" alt="Student Logo">
        <div>
            <h1>Welcome, <span id="studentNameDisplay"></span></h1>
            <div>Email: <span id="studentEmailDisplay"></span></div>
        </div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div id="welcome"></div>

<script>
// Simulate logged-in student email (replace with real login system)
const currentStudentEmail = "student@example.com";
let students = JSON.parse(localStorage.getItem('students')) || [];
const student = students.find(s => s.email === currentStudentEmail);

if(student){
    document.getElementById('studentNameDisplay').innerText = student.name;
    document.getElementById('studentEmailDisplay').innerText = student.email;
    document.getElementById('studentLogo').src = student.profilePicture || 'default-student.png';
} else {
    document.getElementById('studentNameDisplay').innerText = 'Unknown';
}

function logout(){ window.location.href="index.html"; }
</script>

</body>
</html>
