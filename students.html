<!DOCTYPE html>
<html>
<head>
    <title>Students - ADUE Portal</title>
</head>
<body>

<script>
const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedInUser){
    window.location.href = "login.html";
}

// Only admin and students can view
if(loggedInUser.role === "teacher"){
    alert("Teachers cannot view this page!");
    window.location.href = "dashboard.html";
}

const users = JSON.parse(localStorage.getItem("users")) || [];
const students = users.filter(u => u.role === "student");

const table = document.createElement("table");
table.border = "1";
table.style.margin = "20px auto";

const header = table.insertRow();
header.innerHTML = "<th>Name</th><th>Email</th><th>Class</th>";

// Admin sees all students
if(loggedInUser.role === "admin"){
    students.forEach(s => {
        const row = table.insertRow();
        row.innerHTML = `<td>${s.name}</td><td>${s.email}</td><td>${s.class}</td>`;
    });
}
// Student sees only their own info
else if(loggedInUser.role === "student"){
    const s = students.find(st => st.email === loggedInUser.email);
    if(s){
        const row = table.insertRow();
        row.innerHTML = `<td>${s.name}</td><td>${s.email}</td><td>${s.class}</td>`;
    }
}

document.body.appendChild(table);

function logout(){
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
}
</script>

<br>
<a href="dashboard.html">Back to Dashboard</a> | 
<a href="#" onclick="logout()">Logout</a>

</body>
</html>
