<script>
// Get logged-in user
let loggedIn = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedIn){ window.location.href="login.html"; }

let users = JSON.parse(localStorage.getItem("users")) || [];
let tableBody = document.getElementById("studentTable").getElementsByTagName("tbody")[0];
let navBar = document.getElementById("navBar");

// Build nav based on role
if(loggedIn.role === "admin"){
    navBar.innerHTML = `
        <a href="dashboard.html">Dashboard</a>
        <a href="students.html">Students</a>
        <a href="teachers.html">Teachers</a>
        <a href="#" onclick="logout()">Logout</a>
    `;
    // Admin sees all students
    users.filter(u => u.role === "student").forEach(u => {
        let row = tableBody.insertRow();
        row.insertCell(0).innerText = u.name;
        row.insertCell(1).innerText = u.email;
        row.insertCell(2).innerText = u.teacherEmail || "Unassigned";
    });
} else if(loggedIn.role === "teacher"){
    navBar.innerHTML = `<a href="dashboard.html">Dashboard</a><a href="#" onclick="logout()">Logout</a>`;
    // Teacher sees only students assigned to them
    users.filter(u => u.role === "student" && u.teacherEmail === loggedIn.email)
         .forEach(u => {
             let row = tableBody.insertRow();
             row.insertCell(0).innerText = u.name;
             row.insertCell(1).innerText = u.email;
         });
} else {
    // Students cannot access this page
    alert("Access denied! Only teachers or admins can view this page.");
    window.location.href = "dashboard.html";
}

// Logout function
function logout(){
    localStorage.removeItem("loggedInUser");
    window.location.href="index.html";
}
</script>
