<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#f5f5f5; }
.header { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:#800000; color:white; }
.header .logo img { width:120px; height:auto; object-fit:contain; }
.header .profile { display:flex; align-items:center; gap:10px; }
.header .profile img { width:40px; height:40px; border-radius:50%; border:1px solid white; object-fit:cover; }
.header .profile span { font-weight:bold; }
.container { padding:30px; }
button { padding:8px 16px; margin:5px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
button.primary { background:#800000; color:white; }
button.primary:hover { background:#a00000; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.15); }
th, td { padding:12px; text-align:center; border:1px solid #ddd; }
th { background:#800000; color:white; }
img.avatar-small { width:50px; height:50px; border-radius:50%; object-fit:cover; }
table tr:hover { background:#fff2f2; }

/* Modal */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
.modal-content { background:white; padding:20px; border-radius:10px; width:400px; }
.modal-content input { width:100%; padding:5px; margin:5px 0; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo"><img src="logo-new.png" alt="Logo"></div>
    <div class="profile">
        <img src="teacher.png" alt="Teacher">
        <span id="teacherName">Welcome Teacher</span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">

    <!-- Action Buttons -->
    <div class="actions">
        <button class="primary" onclick="openStudentForm()">Register Student</button>
        <button class="primary" onclick="renderStudentsTable()">View Students</button>
    </div>

    <!-- Students Table -->
    <table id="studentsTable"></table>

</div>

<!-- Student Modal -->
<div class="modal" id="studentModal">
  <div class="modal-content">
    <h3>Register Student</h3>
    <input type="text" id="studentNameInput" placeholder="Name">
    <input type="email" id="studentEmailInput" placeholder="Email">
    <input type="text" id="studentIDInput" placeholder="Student ID">
    <input type="text" id="studentClassInput" placeholder="Class">
    <input type="text" id="studentYearInput" placeholder="Year">
    <input type="password" id="studentPasswordInput" placeholder="Password">
    <input type="file" id="studentPicInput">
    <button onclick="registerStudent()">Register</button>
    <button onclick="closeStudentForm()">Cancel</button>
  </div>
</div>

<script>
// Load data
let students = JSON.parse(localStorage.getItem('students')) || [];
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let currentTeacherIndex = parseInt(localStorage.getItem('currentTeacherIndex'));
let currentTeacher = teachers[currentTeacherIndex];
document.getElementById('teacherName').innerText = `Welcome ${currentTeacher.name}`;

// Modal functions
function openStudentForm(){ document.getElementById('studentModal').style.display='flex'; }
function closeStudentForm(){ document.getElementById('studentModal').style.display='none'; }

// Register student
function registerStudent(){
    let name = document.getElementById('studentNameInput').value;
    let email = document.getElementById('studentEmailInput').value;
    let id = document.getElementById('studentIDInput').value;
    let studentClass = document.getElementById('studentClassInput').value;
    let year = document.getElementById('studentYearInput').value;
    let password = document.getElementById('studentPasswordInput').value;
    let file = document.getElementById('studentPicInput').files[0];

    if(!name || !email || !password){ alert("Name, Email, and Password required"); return; }

    let reader = new FileReader();
    reader.onload = function(e){
        let pic = e.target.result;
        students.push({profilePicture: pic, name, email, studentID: id, studentClass, studentYear: year, password, teacherID: currentTeacher.teacherID});
        localStorage.setItem('students', JSON.stringify(students));
        renderStudentsTable();
        closeStudentForm();
        alert("Student registered successfully!");
    }
    if(file) reader.readAsDataURL(file);
    else {
        students.push({profilePicture: 'student.png', name, email, studentID: id, studentClass, studentYear: year, password, teacherID: currentTeacher.teacherID});
        localStorage.setItem('students', JSON.stringify(students));
        renderStudentsTable();
        closeStudentForm();
        alert("Student registered successfully!");
    }
}

// Render students (only this teacher's students)
function renderStudentsTable(){
    const table = document.getElementById('studentsTable');
    let teacherStudents = students.filter(s => s.teacherID === currentTeacher.teacherID);
    let html = `<tr>
        <th>Picture</th><th>Name</th><th>Email</th><th>Student ID</th><th>Class</th><th>Year</th><th>Edit</th><th>Delete</th>
    </tr>`;
    teacherStudents.forEach((s,i)=>{
        html += `<tr>
            <td><img src="${s.profilePicture}" class="avatar-small"></td>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.studentID}</td>
            <td>${s.studentClass}</td>
            <td>${s.studentYear}</td>
            <td><button onclick="editStudentPrompt(${i})">Edit</button></td>
            <td><button onclick="deleteStudentByTeacher(${i}); renderStudentsTable();">Delete</button></td>
        </tr>`;
    });
    table.innerHTML = html;
}

// Edit prompt
function editStudentPrompt(i){
    let teacherStudents = students.filter(s => s.teacherID === currentTeacher.teacherID);
    let s = teacherStudents[i];
    let newName = prompt("Name:", s.name) || s.name;
    let newEmail = prompt("Email:", s.email) || s.email;
    let newClass = prompt("Class:", s.studentClass) || s.studentClass;
    let newYear = prompt("Year:", s.studentYear) || s.studentYear;
    let newPassword = prompt("Password (leave blank to keep hidden):","");
    let index = students.findIndex(x => x.studentID === s.studentID && x.teacherID === currentTeacher.teacherID);
    students[index] = {...students[index], name: newName, email: newEmail, studentClass: newClass, studentYear: newYear, password: newPassword || s.password};
    localStorage.setItem('students', JSON.stringify(students));
    renderStudentsTable();
}

// Delete
function deleteStudentByTeacher(i){
    let teacherStudents = students.filter(s => s.teacherID === currentTeacher.teacherID);
    let s = teacherStudents[i];
    let index = students.findIndex(x => x.studentID === s.studentID && x.teacherID === currentTeacher.teacherID);
    students.splice(index,1);
    localStorage.setItem('students', JSON.stringify(students));
}

// Logout
function logout(){ window.location.href = "index.html"; }

// Initial render
renderStudentsTable();
</script>

</body>
</html>
