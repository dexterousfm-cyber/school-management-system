<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Welcome, <span id="teacherName"></span></h1>
<img id="teacherPic" src="default.png" width="100" style="border-radius:50%">

<h2>Update Profile Picture</h2>
<input type="file" id="updatePictureInput" accept="image/*">

<h2>Register Student</h2>
<button onclick="window.location.href='register_student.html'">Register Student</button>

<script>
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];
let currentTeacherIndex = parseInt(localStorage.getItem("currentTeacherIndex"));
let teacher = teachers[currentTeacherIndex];

document.getElementById("teacherName").innerText = teacher.name;
document.getElementById("teacherPic").src = teacher.profilePicture || 'default.png';

// Update picture
document.getElementById("updatePictureInput").addEventListener("change", function(){
    if(this.files.length>0){
        const reader = new FileReader();
        reader.onload = function(){
            teacher.profilePicture = reader.result;
            teachers[currentTeacherIndex] = teacher;
            localStorage.setItem("teachers", JSON.stringify(teachers));
            document.getElementById("teacherPic").src = reader.result;
        }
        reader.readAsDataURL(this.files[0]);
    }
});
</script>
</body>
</html>
