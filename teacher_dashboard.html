<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard - ADUE Portal</title>
<link rel="stylesheet" href="styles.css">
<style>
.header { background-color:#722F37; padding:20px; color:white; display:flex; align-items:center; justify-content:space-between; }
.header img { width:150px; height:150px; border-radius:50%; border:3px solid white; margin-right:20px; }
.logout-btn { background-color:white; color:#722F37; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:bold; }
.logout-btn:hover { opacity:0.9; }
table { width:100%; border-collapse:collapse; margin-top:20px; }
th, td { border:1px solid #ccc; padding:10px; text-align:center; }
th { background:#eee; }
img { border-radius:50%; }
</style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center;">
        <img id="teacherLogo" src="default-teacher.png" alt="Teacher Logo">
        <div>
            <h1>Welcome, <span id="teacherNameDisplay"></span></h1>
            <div>Email: <span id="teacherEmailDisplay"></span></div>
        </div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<h2>Your Students</h2>
<table border="1" width="100%" id="teacherStudentsTable">
<thead>
<tr>
<th>Student Picture</th>
<th>Student Name</th>
<th>Student Email</th>
<th>Student ID</th>
<th>Class</th>
<th>Year</th>
<th>Teacher Picture</th>
<th>Teacher Name</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
// --- Get the currently logged-in teacher ---
let currentTeacherEmail = localStorage.getItem('currentTeacherEmail');
if(!currentTeacherEmail){
    alert("You are not logged in!");
    window.location.href = "index.html";
}

let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];

// --- Find the teacher object ---
let teacher = teachers.find(t => t.email === currentTeacherEmail);
if(!teacher){
    alert("Teacher not found!");
    window.location.href = "index.html";
}

// --- Display teacher info ---
document.getElementById('teacherNameDisplay').innerText = teacher.name;
document.getElementById('teacherEmailDisplay').innerText = teacher.email;
document.getElementById('teacherLogo').src = teacher.profilePicture || 'default-teacher.png';

// --- Populate students table ---
let tbody = document.querySelector('#teacherStudentsTable tbody');
tbody.innerHTML = '';

students.forEach(s => {
    tbody.innerHTML += `
    <tr>
        <td><img src="${s.profilePicture || 'default-student.png'}" width="70" height="70"></td>
        <td>${s.name}</td>
        <td>${s.email}</td>
        <td>${s.studentID}</td>
        <td>${s.studentClass}</td>
        <td>${s.studentYear}</td>
        <td><img src="${teacher.profilePicture || 'default-teacher.png'}" width="70" height="70"></td>
        <td>${teacher.name}</td>
    </tr>`;
});

// --- Logout function ---
function logout(){
    localStorage.removeItem('currentTeacherEmail');
    window.location.href = "index.html";
}
</script>

</body>
</html>
