<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#f5f5f5; }
.header { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:#800000; color:white; }
.header .logo img { width:120px; }
.header .profile { display:flex; align-items:center; gap:10px; }
.header .profile span { font-weight:bold; }
.container { padding:30px; }
button { padding:8px 16px; margin:5px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
button.primary { background:#800000; color:white; }
button.primary:hover { background:#a00000; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.15); }
th, td { padding:12px; text-align:center; border:1px solid #ddd; }
th { background:#800000; color:white; }
table tr:hover { background:#fff2f2; }

/* Modal styling */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content:center; align-items:center; }
.modal-content { background:white; padding:20px; border-radius:10px; width:300px; }
.modal-content h3 { margin-top:0; color:#800000; }
.modal-content input { width:100%; padding:8px; margin:5px 0; border:1px solid #ccc; border-radius:5px; }
.modal-content button { width:100%; margin-top:10px; }
button.cancel { background:#ccc; color:black; }
button.cancel:hover { background:#999; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo"><img src="logo-new.png" alt="Logo"></div>
    <div class="profile">
        <span id="teacherName">Welcome Teacher</span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <button class="primary" onclick="openStudentForm()">Register Student</button>
    <button class="primary" onclick="renderStudentsTable()">View Students</button>

    <table id="studentsTable"></table>
</div>

<!-- Edit/Delete Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Edit Student</h3>
    <input type="text" id="modalName" placeholder="Name">
    <input type="text" id="modalEmail" placeholder="Email">
    <input type="text" id="modalID" placeholder="Student ID">
    <input type="text" id="modalClass" placeholder="Class">
    <input type="text" id="modalYear" placeholder="Year">
    <input type="password" id="modalPassword" placeholder="Password">
    <button onclick="saveStudent()">Save</button>
    <button class="cancel" onclick="closeModal()">Cancel</button>
    <button class="cancel" style="margin-top:5px;background:#800000;color:white;" onclick="deleteStudent()">Delete Student</button>
  </div>
</div>

<script>
// Load data
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];
let currentTeacherIndex = parseInt(localStorage.getItem('currentTeacherIndex'));
let currentTeacher = teachers[currentTeacherIndex];
document.getElementById('teacherName').innerText = `Welcome ${currentTeacher.name}`;

// For modal editing
let editIndex = null;

// Render students
function renderStudentsTable() {
    const table = document.getElementById('studentsTable');
    let html = `<tr>
        <th>Name</th>
        <th>Email</th>
        <th>Student ID</th>
        <th>Class</th>
        <th>Year</th>
        <th>Edit</th>
    </tr>`;
    students.forEach((s,i)=>{
        html += `<tr>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.studentID}</td>
            <td>${s.studentClass || ''}</td>
            <td>${s.studentYear || ''}</td>
            <td><button onclick="openModal(${i})">Edit/Delete</button></td>
        </tr>`;
    });
    table.innerHTML = html;
}

// Open student form for new registration
function openStudentForm() {
    let name = prompt("Student Name:");
    let email = prompt("Email:");
    let id = prompt("Student ID:");
    let studentClass = prompt("Class:");
    let studentYear = prompt("Year:");
    let password = prompt("Password:");

    students.push({name,email,studentID:id,studentClass,studentYear,password});
    localStorage.setItem('students', JSON.stringify(students));
    renderStudentsTable();
}

// Open modal to edit/delete student
function openModal(i) {
    editIndex = i;
    document.getElementById('modalName').value = students[i].name;
    document.getElementById('modalEmail').value = students[i].email;
    document.getElementById('modalID').value = students[i].studentID;
    document.getElementById('modalClass').value = students[i].studentClass || '';
    document.getElementById('modalYear').value = students[i].studentYear || '';
    document.getElementById('modalPassword').value = students[i].password;
    document.getElementById('modal').style.display = 'flex';
}

// Close modal
function closeModal(){ document.getElementById('modal').style.display='none'; }

// Save changes
function saveStudent() {
    students[editIndex].name = document.getElementById('modalName').value;
    students[editIndex].email = document.getElementById('modalEmail').value;
    students[editIndex].studentID = document.getElementById('modalID').value;
    students[editIndex].studentClass = document.getElementById('modalClass').value;
    students[editIndex].studentYear = document.getElementById('modalYear').value;
    students[editIndex].password = document.getElementById('modalPassword').value;
    localStorage.setItem('students', JSON.stringify(students));
    closeModal();
    renderStudentsTable();
}

// Delete student
function deleteStudent() {
    if(confirm("Are you sure you want to delete this student?")){
        students.splice(editIndex,1);
        localStorage.setItem('students', JSON.stringify(students));
        closeModal();
        renderStudentsTable();
    }
}

// Logout
function logout(){ window.location.href='index.html'; }

// Initial render
renderStudentsTable();
</script>

</body>
</html>
