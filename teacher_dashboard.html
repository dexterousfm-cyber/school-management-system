<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>
<link rel="stylesheet" href="styles.css">
<style>
/* Wine theme and clean design */
body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; }
.header { display:flex; justify-content:space-between; align-items:center; background:#800000; color:white; padding:15px 30px; }
.header .logo img { width:120px; }
.header .profile { display:flex; align-items:center; gap:10px; }
.header .profile span { font-weight:bold; }
.container { padding:30px; }
button { padding:8px 16px; margin:5px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
button.primary { background:#800000; color:white; }
button.primary:hover { background:#a00000; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
th, td { padding:12px; text-align:center; border:1px solid #ddd; }
th { background:#800000; color:white; }
table tr:hover { background:#fff2f2; }
</style>
</head>
<body>

<div class="header">
    <div class="logo"><img src="logo-new.png" alt="Logo"></div>
    <div class="profile">
        <span>Welcome Teacher</span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <button class="primary" onclick="registerStudent()">Register Student</button>
    <button class="primary" onclick="renderStudentsTable()">View Students</button>

    <table id="table"></table>
</div>

<script>
// ---------- LOAD DATA ----------
let currentTeacherIndex = localStorage.getItem('currentTeacherIndex');
let students = JSON.parse(localStorage.getItem('students')) || [];

// ---------- RENDER STUDENTS ----------
function renderStudentsTable() {
    students = JSON.parse(localStorage.getItem('students')) || [];
    let html = `<tr>
        <th>Picture</th><th>Name</th><th>Email</th><th>Student ID</th><th>Class</th><th>Year</th><th>Edit</th>
    </tr>`;
    students.forEach((s, i) => {
        html += `<tr>
            <td>${s.profilePicture || ''}</td>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.studentID}</td>
            <td>${s.studentClass || ''}</td>
            <td>${s.studentYear || ''}</td>
            <td><button onclick="editStudent(${i})">Edit</button></td>
        </tr>`;
    });
    document.getElementById('table').innerHTML = html;
}

// ---------- REGISTER STUDENT ----------
function registerStudent() {
    let name = prompt("Name:");
    let email = prompt("Email:");
    let studentID = prompt("Student ID:");
    let studentClass = prompt("Class:");
    let studentYear = prompt("Year:");
    let password = prompt("Password:");

    students = JSON.parse(localStorage.getItem('students')) || [];
    students.push({name, email, studentID, studentClass, studentYear, password});
    localStorage.setItem('students', JSON.stringify(students));

    renderStudentsTable();
}

// ---------- EDIT STUDENT ----------
function editStudent(i) {
    students = JSON.parse(localStorage.getItem('students')) || [];
    let s = students[i];

    let name = prompt("Name:", s.name);
    let email = prompt("Email:", s.email);
    let studentID = prompt("Student ID:", s.studentID);
    let studentClass = prompt("Class:", s.studentClass);
    let studentYear = prompt("Year:", s.studentYear);
    let password = prompt("Password:", s.password);

    students[i] = {name, email, studentID, studentClass, studentYear, password};
    localStorage.setItem('students', JSON.stringify(students));
    renderStudentsTable();
}

// ---------- LOGOUT ----------
function logout() {
    window.location.href = 'index.html';
}

// ---------- INITIAL LOAD ----------
renderStudentsTable();
</script>

</body>
</html>
