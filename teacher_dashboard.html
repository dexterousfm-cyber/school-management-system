<!-- Header with teacher picture -->
<img id="teacherLogo" src="default-teacher.png" width="150" height="150" style="border-radius:50%; border:3px solid #722F37;">
<span id="teacherNameDisplay"></span>
<button onclick="logout()">Logout</button>

<!-- Students table -->
<table id="teacherStudentsTable">
<thead><tr><th>Picture</th><th>Name</th><th>Email</th><th>Student ID</th><th>Class</th><th>Year</th></tr></thead>
<tbody></tbody>
</table>

<script>
// currentTeacherEmail from login
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];
let currentTeacherEmail = localStorage.getItem('currentTeacherEmail');
let teacher = teachers.find(t=>t.email===currentTeacherEmail);

if(teacher){
    document.getElementById('teacherNameDisplay').innerText = teacher.name;
    document.getElementById('teacherLogo').src = teacher.profilePicture || 'default-teacher.png';
}

let tbody = document.querySelector('#teacherStudentsTable tbody');
students.forEach(s=>{
    tbody.innerHTML += `<tr>
        <td><img src="${s.profilePicture||'default-student.png'}" width="70" height="70" style="border-radius:50%;"></td>
        <td>${s.name}</td><td>${s.email}</td><td>${s.studentID}</td><td>${s.studentClass}</td><td>${s.studentYear}</td>
    </tr>`;
});

function logout(){ window.location.href="index.html"; }
</script>
