<!DOCTYPE html>
<html>
<head>
    <title>Teachers</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
        }
        .nav {
            text-align: center;
            padding: 10px;
            background: #333;
        }
        .nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        .nav a.current {
            text-decoration: underline;
        }
        .container {
            width: 300px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        button {
            padding: 10px;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<script>
if (!localStorage.getItem("loggedInUser")) {
    window.location.href = "index.html";
}
</script>

<div class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="students.html">Students</a>
    <a href="teachers.html" class="current">Teachers</a>
</div>

<div class="container">
    <h3 id="welcomeUser"></h3>

    <h2>Teachers Page</h2>
    <p>No teachers added yet</p>

    <a href="add-teacher.html">Add Teacher</a>
    <br><br>

    <button onclick="logout()">Logout</button>
</div>

<script>
const user = localStorage.getItem("loggedInUser");
document.getElementById("welcomeUser").textContent = "Welcome, " + user;

function logout() {
    localStorage.removeItem("loggedInUser");
    window.location.href = "index.html";
}
</script>

</body>
</html>
