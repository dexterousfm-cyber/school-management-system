<!DOCTYPE html>
<html>
<head>
    <title>Teachers - School System</title>
</head>
<body style="font-family: Arial; background-color: #f4f4f4;">

    <!-- Navigation Menu -->
    <div style="text-align: center; padding: 10px; background: #333; color: white;">
        <a href="dashboard.html" style="color: white; margin: 10px;">Dashboard</a>
        <a href="students.html" style="color: white; margin: 10px;">Students</a>
        <a href="teachers.html" style="color: white; margin: 10px;">Teachers</a>
    </div>

    <!-- Page Title -->
    <h1 style="text-align: center;">Teachers</h1>

    <!-- Teachers Table and Add Form -->
    <div style="width: 80%; margin: auto;">

        <table id="teacherTable" border="1" width="100%" style="background: white; border-collapse: collapse;">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Subject</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Mr. Ade</td>
                <td>Math</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Mrs. Funke</td>
                <td>English</td>
            </tr>
        </table>

        <br>
        <input type="text" id="newTeacherName" placeholder="Teacher Name" style="padding:5px;">
        <input type="text" id="newTeacherSubject" placeholder="Subject" style="padding:5px;">
        <button onclick="addTeacher()" style="padding: 5px 10px; background: green; color: white; border: none; border-radius: 5px;">
            Add Teacher
        </button>

    </div>

    <!-- Back to Dashboard -->
    <br>
    <div style="text-align: center;">
        <a href="dashboard.html">Back to Dashboard</a>
    </div>

    <!-- JavaScript to add teachers dynamically -->
    <script>
        function addTeacher() {
            var table = document.getElementById("teacherTable");
            var name = document.getElementById("newTeacherName").value;
            var subject = document.getElementById("newTeacherSubject").value;

            if(name === "" || subject === "") {
                alert("Please fill both fields");
                return;
            }

            var rowCount = table.rows.length;
            var row = table.insertRow(rowCount);
            var cell1 = row.insertCell(0);
            var cell2 = row.insertCell(1);
            var cell3 = row.insertCell(2);

            cell1.innerHTML = rowCount;
            cell2.innerHTML = name;
            cell3.innerHTML = subject;

            document.getElementById("newTeacherName").value = "";
            document.getElementById("newTeacherSubject").value = "";
        }
    </script>

</body>
</html>
