<!DOCTYPE html>
<html>
<head>
    <title>Teachers - ADUE Portal</title>
</head>
<body>

<script>
const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedInUser){
    window.location.href = "login.html"; // redirect if not logged in
}

// Only admin and teachers can view
if(loggedInUser.role === "student"){
    alert("Students cannot view this page!");
    window.location.href = "dashboard.html";
}

const users = JSON.parse(localStorage.getItem("users")) || [];
const teachers = users.filter(u => u.role === "teacher");

const table = document.createElement("table");
table.border = "1";
table.style.margin = "20px auto";

const header = table.insertRow();
header.innerHTML = "<th>Name</th><th>Email</th><th>Subject</th>";

// Admin sees all teachers
if(loggedInUser.role === "admin"){
    teachers.forEach(t => {
        const row = table.insertRow();
        row.innerHTML = `<td>${t.name}</td><td>${t.email}</td><td>${t.subject || ""}</td>`;
    });
}
// Teacher sees only their own info
else if(loggedInUser.role === "teacher"){
    const t = teachers.find(tr => tr.email === loggedInUser.email);
    if(t){
        const row = table.insertRow();
        row.innerHTML = `<td>${t.name}</td><td>${t.email}</td><td>${t.subject || ""}</td>`;
    }
}

document.body.appendChild(table);

function logout(){
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
}
</script>

<br>
<a href="dashboard.html">Back to Dashboard</a> | 
<a href="#" onclick="logout()">Logout</a>

</body>
</html>
