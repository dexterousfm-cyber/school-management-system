<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teachers - Adue International School</title>
    <meta name="description" content="Adue International School - View and manage teachers in ADUE Portal.">
    <meta name="keywords" content="Adue International School, ADUE Portal, Teachers, Admin">
    <meta name="author" content="Abiola Ridwan Olamilekan">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin:0; padding:0; }
        .nav { text-align:center; padding:10px; background:#333; }
        .nav a { color:white; margin:0 15px; font-weight:bold; text-decoration:none; }
        .nav a.current { text-decoration:underline; }
        table { width:60%; margin:30px auto; border-collapse:collapse; background:white; box-shadow:0 0 10px rgba(0,0,0,0.1); }
        th, td { border:1px solid #ccc; padding:10px; text-align:center; }
        input { width:90%; padding:5px; border-radius:5px; border:1px solid #ccc; }
        button { padding:5px 10px; margin:5px; cursor:pointer; border-radius:5px; border:none; background:green; color:white; }
    </style>
</head>
<body>

<script>
const loggedUser = localStorage.getItem("loggedInUser");
const loggedRole = localStorage.getItem("loggedRole");
if(!loggedUser || !loggedRole){ window.location.href="index.html"; }
</script>

<div class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="students.html">Students</a>
    <a href="teachers.html" class="current">Teachers</a>
    <button style="background:red;" onclick="logout()">Logout</button>
</div>

<div id="adminSection" style="width:60%; margin:20px auto; display:none;">
    <h3>Add New Teacher</h3>
    <input type="text" id="tName" placeholder="Full Name">
    <input type="text" id="tSubject" placeholder="Subject">
    <input type="text" id="tUsername" placeholder="Username">
    <input type="password" id="tPassword" placeholder="Password">
    <button onclick="addTeacher()">Add Teacher</button>
</div>

<table id="teacherTable">
    <thead><tr><th>Name</th><th>Subject</th><th>Username</th></tr></thead>
    <tbody></tbody>
</table>

<script>
function logout(){ localStorage.removeItem("loggedInUser"); localStorage.removeItem("loggedInRole"); window.location.href="index.html"; }

function loadTeachers(){
    const teachers = JSON.parse(localStorage.getItem("teachers")) || [];
    const tbody=document.querySelector("#teacherTable tbody");
    tbody.innerHTML="";
    if(loggedRole==="admin"){
        document.getElementById("adminSection").style.display="block";
        teachers.forEach(t=>{
            const row=document.createElement("tr");
            row.innerHTML=`<td>${t.name}</td><td>${t.subject}</td><td>${t.username}</td>`;
            tbody.appendChild(row);
        });
    } else {
        const teacher = teachers.find(t=>t.username===loggedUser);
        if(teacher){
            const row=document.createElement("tr");
            row.innerHTML=`<td>${teacher.name}</td><td>${teacher.subject}</td><td>${teacher.username}</td>`;
            tbody.appendChild(row);
        }
    }
}

function addTeacher(){
    const name=document.getElementById("tName").value.trim();
    const subject=document.getElementById("tSubject").value.trim();
    const username=document.getElementById("tUsername").value.trim();
    const password=document.getElementById("tPassword").value.trim();
    if(!name||!subject||!username||!password){ alert("Fill all fields!"); return; }

    let teachers=JSON.parse(localStorage.getItem("teachers"))||[];
    if(teachers.some(t=>t.username===username)){ alert("Username exists!"); return; }

    teachers.push({name,subject,username,password});
    localStorage.setItem("teachers", JSON.stringify(teachers));
    alert("Teacher added successfully!");
    document.getElementById("tName").value="";
    document.getElementById("tSubject").value="";
    document.getElementById("tUsername").value="";
    document.getElementById("tPassword").value="";
    loadTeachers();
}

window.onload=loadTeachers;
</script>

</body>
</html>
